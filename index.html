// دالة عرض التكاليف النشطة مع عداد تنازلي (بالأيام والساعات والدقائق والثواني)
function renderActiveTasksCard() {
    const container = document.getElementById('activeTasksContainer');
    if (!container) return;
    
    const now = new Date();
    const activeTasks = appData.tasks.filter(task => {
        if (!task.endDate) return false;
        return new Date(task.endDate) > now;
    });
    
    if (activeTasks.length === 0) {
        container.innerHTML = '<p style="text-align:center;">🎉 لا توجد تكاليف نشطة حالياً</p>';
        return;
    }
    
    const tasksHtml = activeTasks.map(task => {
        const squad = appData.squads.find(s => s.id === task.squadId);
        const endDate = new Date(task.endDate);
        const timeRemaining = endDate - now;
        
        let countdownText = '';
        let isExpired = false;
        
        if (timeRemaining > 0) {
            const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeRemaining % (86400000)) / (3600000));
            const minutes = Math.floor((timeRemaining % 3600000) / 60000);
            const seconds = Math.floor((timeRemaining % 60000) / 1000);
            countdownText = `${days} يوم ${hours} ساعة ${minutes} دقيقة ${seconds} ثانية`;
        } else {
            countdownText = 'انتهى الوقت';
            isExpired = true;
        }
        
        return `
            <div class="task-item" style="${isExpired ? 'opacity: 0.6; background: #f0f0f0;' : ''}">
                <div class="task-header">
                    <span class="task-title">${escapeHtml(task.title)}</span>
                    <span class="task-points">${task.pointsValue} نقطة</span>
                </div>
                <div class="task-description">${escapeHtml(task.description)}</div>
                <div class="task-meta">
                    <i class="fas fa-flag"></i> ${squad?.name || '-'} | 
                    <i class="fas fa-calendar-alt"></i> بدأ: ${new Date(task.startDate).toLocaleString('ar-EG')} | 
                    <i class="fas fa-calendar-times"></i> ينتهي: ${endDate.toLocaleString('ar-EG')}
                </div>
                <div class="task-countdown" style="margin-top: 10px; padding: 8px; background: ${isExpired ? '#e74c3c20' : '#d4a01720'}; border-radius: 10px;">
                    <i class="fas ${isExpired ? 'fa-hourglass-end' : 'fa-hourglass-half'}"></i>
                    <strong>${isExpired ? '⏰ انتهى الموعد النهائي' : '⏳ الوقت المتبقي: ' + countdownText}</strong>
                </div>
            </div>
        `;
    }).join('');
    
    container.innerHTML = `
        <div style="margin-bottom: 15px;">
            <span class="badge badge-active"><i class="fas fa-play-circle"></i> التكاليف النشطة: ${activeTasks.length}</span>
        </div>
        ${tasksHtml}
    `;
}

        // فقط نحدث الأرقام دون إعادة رسم الأزرار
        const selectedSquad = localStorage.getItem('selectedSquad') || 'all';

}

        function renderMembersTable() {
    const searchTerm = document.getElementById('memberSearch')?.value?.toLowerCase() || '';
    const branchFilter = document.getElementById('branchFilter')?.value || '';
    const squadFilter = document.getElementById('squadFilter')?.value || '';
    
    // ترتيب الرتب حسب الأهمية
    const rankOrder = {
        'عريف اول': 1,
        'عريف': 2,
        'سكرتير': 3,
        'امين صندوق': 4,
        'مساعد عريف اول': 5,
        'مساعد عريف': 6
    };
    
    let filtered = appData.members.filter(m => 
        (m.name.toLowerCase().includes(searchTerm) || m.code.toLowerCase().includes(searchTerm) || m.username.toLowerCase().includes(searchTerm)) &&
        (branchFilter === '' || m.branchId == branchFilter) &&
        (squadFilter === '' || m.squadId == squadFilter)
    );
    
    // ترتيب الأعضاء حسب الرتبة (الأعلى أولاً)
    filtered.sort((a, b) => {
        const orderA = rankOrder[a.rank] || 999;
        const orderB = rankOrder[b.rank] || 999;
        return orderA - orderB;
    });
    
    const container = document.getElementById('membersTable');
    container.innerHTML = `
        <div style="overflow-x:auto;"><table class="data-table"><thead><tr><th>الكود</th><th>الاسم</th><th>الرتبة</th><th>اسم المستخدم</th><th>الهاتف</th><th>الطليعة</th><th>النقاط</th><th>الإجراءات</th></tr></thead><tbody>
        ${filtered.map(m => `<tr>
            <td>${m.code}</td>
            <td>${m.name}${m.id === currentUser?.id ? ' <span class="badge" style="background:#d4a017;">أنت</span>' : ''}</td>
            <td><span class="badge" style="background:${m.rank === 'عريف اول' ? '#d4a017' : '#666'};">${m.rank || 'عضو'}</span></td>
            <td>${m.username}</td>
            <td>${m.phone}</td>
            <td>${appData.squads.find(s => s.id === m.squadId)?.name || '-'}</td>
            <td>${m.points}</td>
            <td>
                <button class="btn btn-sm btn-info" onclick="showMemberDetails(${m.id})"><i class="fas fa-eye"></i></button>
                <button class="btn btn-sm btn-warning" onclick="showEditMemberModal(${m.id})"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-success" onclick="showAdjustPointsModal(${m.id})"><i class="fas fa-plus-circle"></i></button>
                <button class="btn btn-sm btn-danger" onclick="deleteMember(${m.id})"><i class="fas fa-trash"></i></button>
                            </td>
        `).join('')}
        ${filtered.length === 0 ? '<tr><td colspan="8" style="text-align:center;">لا توجد بيانات</td></tr>' : ''}
        </tbody></table></div>
    `;
}

        showToast(`تم إضافة القائد ${newLeader.name} بنجاح`);

}

// ==================== LEADER FUNCTIONS (تعريف مبكر) ====================

function renderLeaderDashboard() {
    const leader = currentUser;
    const mySubBranchIds = leader.subBranchIds || [];
    const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.subBranchId));
    const mySquadIds = mySquads.map(s => s.id);
    const myMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    const now = new Date();
    const activeTasks = appData.tasks.filter(t => mySquadIds.includes(t.squadId) && new Date(t.endDate) > now);
    const pendingJoinRequests = appData.joinRequests.filter(r => mySquadIds.includes(r.squadId) && r.status === 'pending');
    
    const container = document.getElementById('leaderPageContent');
    if (!container) return;
    
    container.innerHTML = `
        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-users"></i><div class="number">${myMembers.length}</div><div class="label">الأعضاء</div></div>
            <div class="stat-card"><i class="fas fa-flag-checkered"></i><div class="number">${mySquads.length}</div><div class="label">الطلايع</div></div>
            <div class="stat-card"><i class="fas fa-tasks"></i><div class="number">${activeTasks.length}</div><div class="label">تكاليف نشطة</div></div>
            <div class="stat-card" style="cursor:pointer;" onclick="changeLeaderPage('joinRequests')"><i class="fas fa-user-plus"></i><div class="number" style="color:${pendingJoinRequests.length > 0 ? '#e74c3c' : '#2ecc71'};">${pendingJoinRequests.length}</div><div class="label">طلبات انضمام</div></div>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-trophy"></i> ترتيب الأعضاء</h3>
            <div class="squad-filter" style="margin-bottom: 15px;">
                <select id="leaderRankingFilter" onchange="updateLeaderRankingList()" style="width:100%; padding:10px; border-radius:30px;">
                    <option value="all">🏆 جميع الطلائع (أفضل 5 أعضاء)</option>
                    ${mySquads.map(s => `<option value="${s.id}">🏴 ${s.name} (جميع الأعضاء)</option>`).join('')}
                </select>
            </div>
            <div id="leaderRankingList"></div>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-hourglass-half"></i> التكاليف النشطة</h3>
            <div id="leaderActiveTasksList"></div>
        </div>
    `;
    
    updateLeaderRankingList();
    
    if (activeTasks.length === 0) {
        const tasksContainer = document.getElementById('leaderActiveTasksList');
        if (tasksContainer) tasksContainer.innerHTML = '<p style="text-align:center;">🎉 لا توجد تكاليف نشطة حالياً</p>';
    } else {
        const tasksHtml = activeTasks.map(task => {
            const squad = appData.squads.find(s => s.id === task.squadId);
            const endDate = new Date(task.endDate);
            const timeRemaining = endDate - now;
            let countdownText = timeRemaining > 0 ? `${Math.floor(timeRemaining / (1000*60*60*24))} يوم ${Math.floor((timeRemaining % 86400000) / 3600000)} ساعة` : 'انتهى الوقت';
            return `<div class="task-item"><div class="task-header"><span class="task-title">${escapeHtml(task.title)}</span><span class="task-points">${task.pointsValue} نقطة</span></div><div class="task-description">${escapeHtml(task.description)}</div><div class="task-meta"><i class="fas fa-flag"></i> ${squad?.name || '-'} | <i class="fas fa-calendar"></i> ينتهي: ${endDate.toLocaleString('ar-EG')}</div><div class="task-countdown" style="margin-top:8px; padding:6px; background:#d4a01720; border-radius:8px;"><i class="fas fa-hourglass-half"></i> الوقت المتبقي: ${countdownText}</div></div>`;
        }).join('');
        const tasksContainer = document.getElementById('leaderActiveTasksList');
        if (tasksContainer) tasksContainer.innerHTML = tasksHtml;
    }
}

function updateLeaderRankingList() {
    const leader = currentUser;
    const filterValue = document.getElementById('leaderRankingFilter')?.value || 'all';
    const mySubBranchIds = leader.subBranchIds || [];
    const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.subBranchId));
    const mySquadIds = mySquads.map(s => s.id);
    let myMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    myMembers.sort((a, b) => b.points - a.points);
    
    const listContainer = document.getElementById('leaderRankingList');
    if (!listContainer) return;
    
    if (filterValue === 'all') {
        const topMembers = myMembers.slice(0, 5);
        if (topMembers.length === 0) { listContainer.innerHTML = '<p style="text-align:center;">لا يوجد أعضاء</p>'; return; }
        const rankingHtml = topMembers.map((member, idx) => {
            const squad = appData.squads.find(s => s.id === member.squadId);
            const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '📌';
            return `<div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee;"><div style="display:flex; align-items:center; gap:10px;"><span style="font-size:22px;">${medal}</span><div><strong>${escapeHtml(member.name)}</strong><br><small style="color:#666;">${squad?.name || '-'} | ${member.rank}</small></div></div><div><strong style="color:#1a472a;">${member.points}</strong> نقطة</div></div>`;
        }).join('');
        listContainer.innerHTML = `<div style="margin-bottom:15px; text-align:center;"><span class="badge badge-active">🏆 أفضل 5 أعضاء</span></div>${rankingHtml}`;
    } else {
        const squadMembers = myMembers.filter(m => m.squadId == filterValue);
        if (squadMembers.length === 0) { listContainer.innerHTML = '<p style="text-align:center;">لا يوجد أعضاء في هذه الطليعة</p>'; return; }
        const squad = appData.squads.find(s => s.id == filterValue);
        const rankingHtml = squadMembers.map((member, idx) => `<div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee;"><div style="display:flex; align-items:center; gap:10px;"><span style="background:${idx === 0 ? '#d4a017' : idx === 1 ? '#c0c0c0' : idx === 2 ? '#cd7f32' : '#666'}; color:white; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">${idx+1}</span><div><strong>${escapeHtml(member.name)}</strong><br><small>${member.rank} | ${member.points} نقطة</small></div></div><div><strong style="color:#1a472a;">${member.points}</strong> نقطة</div></div>`).join('');
        listContainer.innerHTML = `<div style="margin-bottom:15px; text-align:center;"><h4 style="color:#1a472a;">🏴 ${squad?.name || ''}</h4><span class="badge badge-active">إجمالي الأعضاء: ${squadMembers.length}</span></div>${rankingHtml}`;
    }
}

let leaderCountdownInterval = null;

function startLeaderCountdownUpdater() {
    if (leaderCountdownInterval) clearInterval(leaderCountdownInterval);
    leaderCountdownInterval = setInterval(() => {
        if (document.getElementById('leaderPageContent') && currentUser && isLeader) {
            renderLeaderDashboard();
        }
    }, 60000); // تحديث كل دقيقة
}

function stopLeaderCountdownUpdater() {
    if (leaderCountdownInterval) {
        clearInterval(leaderCountdownInterval);
        leaderCountdownInterval = null;
    }
}

function filterLeaderMembers() {
    const leader = currentUser;
    const searchTerm = document.getElementById('leaderMemberSearch')?.value?.toLowerCase() || '';
    const squadFilter = document.getElementById('leaderSquadFilter')?.value || 'all';
    const mySubBranchIds = leader.subBranchIds || [];
    const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.subBranchId));
    const mySquadIds = mySquads.map(s => s.id);
    let myMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    
    if (squadFilter !== 'all') {
        myMembers = myMembers.filter(m => m.squadId == squadFilter);
    }
    if (searchTerm) {
        myMembers = myMembers.filter(m => m.name.toLowerCase().includes(searchTerm) || m.code.toLowerCase().includes(searchTerm));
    }
    
    const rankOrder = { 'عريف اول': 1, 'عريف': 2, 'سكرتير': 3, 'امين صندوق': 4, 'مساعد عريف اول': 5, 'مساعد عريف': 6 };
    myMembers.sort((a, b) => (rankOrder[a.rank] || 999) - (rankOrder[b.rank] || 999));
    
    const tableHtml = `
        <div style="overflow-x:auto;"><table class="data-table"><thead><tr><th>الكود</th><th>الاسم</th><th>الرتبة</th><th>اسم المستخدم</th><th>الهاتف</th><th>الطليعة</th><th>النقاط</th><th>الإجراءات</th></tr></thead><tbody>
        ${myMembers.map(m => {
            const squad = appData.squads.find(s => s.id === m.squadId);
            return `<tr>
                <td>${m.code}</td>
                <td>${m.name}${m.id === leader?.id ? ' <span class="badge" style="background:#d4a017;">أنت</span>' : ''}</td>
                <td><span class="badge" style="background:${m.rank === 'عريف اول' ? '#d4a017' : '#666'};">${m.rank || 'عضو'}</span></td>
                <td>${m.username}</td>
                <td>${m.phone}</td>
                <td>${squad?.name || '-'}</td>
                <td>${m.points}</td>
                <td>
                    <button class="btn btn-sm btn-info" onclick="showMemberDetails(${m.id})"><i class="fas fa-eye"></i></button>
                    <button class="btn btn-sm btn-warning" onclick="showEditMemberModal(${m.id})"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-sm btn-success" onclick="showAdjustPointsModal(${m.id})"><i class="fas fa-plus-circle"></i></button>
                 </td>
            </tr>`;
        }).join('')}
        ${myMembers.length === 0 ? '<tr><td colspan="8" style="text-align:center;">⚠️ لا يوجد أعضاء في الفروع المسؤول عنها</td>' : ''}
        </tbody>}~table</div>
    `;
    const tableContainer = document.getElementById('leaderMembersTable');
    if (tableContainer) tableContainer.innerHTML = tableHtml;
}

function showAddTaskModalForLeader() {
    const leader = currentUser;
    const mySquads = appData.squads.filter(s => s.branchId === leader.branchId);
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content">
            <div class="modal-header"><h3><i class="fas fa-tasks"></i> إضافة تكليف جديد</h3><span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span></div>
            <form id="addTaskFormLeader">
                <div class="input-group"><label>اختر الطليعة</label>
                    <select id="taskSquadSelect" required style="width:100%; padding:12px; border-radius:12px; border:2px solid #e0e0e0; margin-bottom:15px;">
                        <option value="">-- اختر الطليعة --</option>
                        ${mySquads.map(s => `<option value="${s.id}">🏴 ${s.name} (القائد: ${s.leader})</option>`).join('')}

                </div>
                <div class="input-group"><label>عنوان التكليف</label><input type="text" id="taskTitle" required></div>
                <div class="input-group"><label>وصف التكليف</label><textarea id="taskDesc" rows="3" required></textarea></div>
                <div class="input-group"><label>قيمة النقاط</label><input type="number" id="taskPoints" value="10" required></div>
                <div class="input-group"><label>تاريخ ووقت البدء</label><input type="datetime-local" id="taskStartDate" required></div>
                <div class="input-group"><label>تاريخ ووقت الانتهاء</label><input type="datetime-local" id="taskEndDate" required></div>
                <button type="submit" class="btn btn-primary" style="width:100%;">إضافة التكليف</button>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    // تعيين التواريخ الافتراضية
    const now = new Date();
    document.getElementById('taskStartDate').value = now.toISOString().slice(0, 16);
    document.getElementById('taskEndDate').value = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000).toISOString().slice(0, 16);
    
    document.getElementById('addTaskFormLeader').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const squadId = parseInt(document.getElementById('taskSquadSelect').value);
        if (!squadId) {
            showToast('الرجاء اختيار الطليعة أولاً', 'error');
            return;
        }
        
        const startDate = new Date(document.getElementById('taskStartDate').value);
        const endDate = new Date(document.getElementById('taskEndDate').value);
        
        if (endDate <= startDate) {
            showToast('تاريخ الانتهاء يجب أن يكون بعد تاريخ البدء', 'error');
            return;
        }
        
        const squad = appData.squads.find(s => s.id === squadId);
        
        const newTask = {
            id: Date.now(),
            squadId: squadId,
            title: document.getElementById('taskTitle').value,
            description: document.getElementById('taskDesc').value,
            pointsValue: parseInt(document.getElementById('taskPoints').value),
            createdAt: new Date().toISOString(),
            startDate: startDate.toISOString(),
            endDate: endDate.toISOString(),
            seenByMembers: []
        };
        appData.tasks.push(newTask);
        await saveAllDataToFirebase();
        
        const squadMembers = appData.members.filter(m => m.squadId === squadId);
        squadMembers.forEach(member => {
            sessionStorage.removeItem('notificationShown_' + member.id);
        });
        
        showToast(`تم إضافة التكليف "${newTask.title}" إلى طليعة ${squad.name}`);
        modal.remove();
        renderLeaderTasks();
    });
}

// دردشة القائد (لمجموعاته فقط)
function renderLeaderCommunity() {
    const leader = currentUser;
    
    const mySquads = appData.squads.filter(s => s.branchId === leader.branchId);
    const mySquadIds = mySquads.map(s => s.id);
    
    const container = document.getElementById('leaderPageContent');
    container.innerHTML = `
        <div class="card">
            <h3><i class="fas fa-comments"></i> الكميونيتي - دردشة فريقي</h3>
            <div class="squad-filter">
                <select id="leaderChatFilter" onchange="loadLeaderMessages()">
                    <option value="all">📢 جميع الطلايع (بث عام لفريقي)</option>
                    ${mySquads.map(s => `<option value="${s.id}">🏴 ${s.name}</option>`).join('')}
                </select>
                <button class="broadcast-btn" onclick="showLeaderBroadcastModal()"><i class="fas fa-bullhorn"></i> إرسال للجميع (فريقي)</button>
            </div>
            <div class="chat-container">
                <div class="chat-messages" id="leaderChatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="leaderMessageInput" placeholder="اكتب رسالتك...">
                    <button onclick="sendLeaderMessage()"><i class="fas fa-paper-plane"></i> إرسال</button>
                </div>
            </div>
        </div>
    `;
    loadLeaderMessages();
}

function loadLeaderMessages() {
    const filter = document.getElementById('leaderChatFilter')?.value || 'all';
    const leader = currentUser;
    
    const mySquads = appData.squads.filter(s => s.branchId === leader.branchId);
    const mySquadIds = mySquads.map(s => s.id);
    
    let messages = appData.messages.filter(m => {
        if (filter === 'all') {
            return (m.squadId && mySquadIds.includes(m.squadId)) || m.isBroadcast === true;
        } else {
            return m.squadId == filter && !m.isBroadcast;
        }
    });
    messages.sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
    
    const container = document.getElementById('leaderChatMessages');
    if (!container) return;
    container.innerHTML = messages.map(m => `
        <div class="message ${m.senderId === leader.id || m.senderId === 'admin' ? 'sent' : 'received'}">
            <div class="sender"><i class="fas fa-user"></i> ${m.senderName}</div>
            <div class="text">${escapeHtml(m.text)}</div>
            <div class="time">${new Date(m.timestamp).toLocaleString('ar-EG')}</div>
        </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
}

async function sendLeaderMessage() {
    const input = document.getElementById('leaderMessageInput');
    const text = input.value.trim();
    if (!text) return;
    const filter = document.getElementById('leaderChatFilter')?.value || 'all';
    const leader = currentUser;
    
    const newMessage = {
        id: Date.now(),
        squadId: filter === 'all' ? null : parseInt(filter),
        senderId: leader.id,
        senderName: leader.name,
        text: text,
        timestamp: new Date().toISOString(),
        isBroadcast: filter === 'all'
    };
    appData.messages.push(newMessage);
    await saveAllDataToFirebase();
    input.value = '';
    loadLeaderMessages();
    showToast('تم إرسال الرسالة');
}

function showLeaderBroadcastModal() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content">
            <div class="modal-header"><h3><i class="fas fa-bullhorn"></i> إرسال رسالة لجميع طلايع فريقي</h3><span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span></div>
            <textarea id="leaderBroadcastText" rows="4" placeholder="أدخل نص الرسالة..." style="width:100%; padding:12px; border-radius:12px; border:2px solid #e0e0e0; margin-bottom:15px;"></textarea>
            <button class="btn btn-primary" onclick="sendLeaderBroadcast(); this.closest('.modal').remove();" style="width:100%;">إرسال للجميع</button>
        </div>

    document.body.appendChild(modal);
}

async function sendLeaderBroadcast() {
    const text = document.getElementById('leaderBroadcastText')?.value.trim();
    if (!text) return;
    const leader = currentUser;
    
    const newMessage = {
        id: Date.now(),
        squadId: null,
        senderId: leader.id,
        senderName: leader.name,
        text: text,
        timestamp: new Date().toISOString(),
        isBroadcast: true
    };
    appData.messages.push(newMessage);
    await saveAllDataToFirebase();
    showToast('تم إرسال البث للجميع');
    if (document.getElementById('leaderChatFilter')) loadLeaderMessages();
}

async function confirmDeleteBranch(branchId) {
    // حذف الفروع التابعة
    appData.subBranches = appData.subBranches.filter(sb => sb.branchId !== branchId);
    // حذف الطلايع التابعة
    const squadsToDelete = appData.squads.filter(s => s.branchId === branchId);
    squadsToDelete.forEach(squad => {
        appData.members.forEach(m => { if (m.squadId === squad.id) m.squadId = null; });
    });
    appData.squads = appData.squads.filter(s => s.branchId !== branchId);
    // حذف المنطقة
    appData.branches = appData.branches.filter(b => b.id !== branchId);
    
    await saveAllDataToFirebase();
    renderSquadsList();
    renderAdminDashboard();
    showToast('تم حذف المجموعه وجميع فروعها وطلايعها');
}

       function showAddTaskModal() {
    const squadId = document.getElementById('taskSquadSelect')?.value;
    if (!squadId) { showToast('الرجاء اختيار الطليعة أولاً', 'error'); return; }
    
    // تعيين التاريخ والوقت الحالي كقيم افتراضية
    const now = new Date();
    const defaultStartDate = now.toISOString().slice(0, 16);
    const defaultEndDate = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000).toISOString().slice(0, 16);
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content">
            <div class="modal-header"><h3><i class="fas fa-tasks"></i> إضافة تكليف جديد</h3><span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span></div>
            <form id="addTaskForm">
                <div class="input-group"><label>عنوان التكليف</label><input type="text" id="taskTitle" required></div>
                <div class="input-group"><label>وصف التكليف</label><textarea id="taskDesc" rows="3" required></textarea></div>
                <div class="input-group"><label>قيمة النقاط</label><input type="number" id="taskPoints" value="10" required></div>
                <div class="input-group"><label>تاريخ ووقت البدء</label><input type="datetime-local" id="taskStartDate" value="${defaultStartDate}" required></div>
                <div class="input-group"><label>تاريخ ووقت الانتهاء</label><input type="datetime-local" id="taskEndDate" value="${defaultEndDate}" required></div>
                <button type="submit" class="btn btn-primary" style="width:100%;">إضافة التكليف</button>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('addTaskForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const startDate = new Date(document.getElementById('taskStartDate').value);
        const endDate = new Date(document.getElementById('taskEndDate').value);
        
        if (endDate <= startDate) {
            showToast('تاريخ الانتهاء يجب أن يكون بعد تاريخ البدء', 'error');
            return;
        }
        
        const newTask = {
            id: Date.now(),
            squadId: parseInt(squadId),
            title: document.getElementById('taskTitle').value,
            description: document.getElementById('taskDesc').value,
            pointsValue: parseInt(document.getElementById('taskPoints').value),
            createdAt: new Date().toISOString(),
            startDate: startDate.toISOString(),
            endDate: endDate.toISOString(),
            seenByMembers: []  // مصفوفة لتخزين IDs الأعضاء الذين شاهدوا التكليف
        };
        appData.tasks.push(newTask);
        await saveAllDataToFirebase();
        
        // إعادة تعيين إشعارات الأعضاء في هذه الطليعة
        const squadMembers = appData.members.filter(m => m.squadId == squadId);
        squadMembers.forEach(member => {
            sessionStorage.removeItem('notificationShown_' + member.id);
        });
        
        showToast('تم إضافة التكليف وسيظهر إشعار للأعضاء');
        modal.remove();
        renderTasksListAdmin();
        renderAdminDashboard();
    });
}

        function renderTasksListAdmin() {
    const container = document.getElementById('tasksListAdmin');
    if (!container) return;
    container.innerHTML = appData.tasks.map(task => {
        const squadName = appData.squads.find(s => s.id === task.squadId)?.name;
        const submissions = appData.taskSubmissions.filter(ts => ts.taskId === task.id);
        const viewers = task.seenByMembers || [];
        return `
            <div class="task-item">
                <div class="task-header"><span class="task-title">${task.title}</span><span class="task-points">${task.pointsValue} نقطة</span></div>
                <div class="task-description">${task.description}</div>
                <div class="task-meta"><i class="fas fa-flag"></i> ${squadName} | <i class="fas fa-calendar"></i> ${new Date(task.endDate).toLocaleDateString('ar-EG')}</div>
                <div class="task-meta"><i class="fas fa-eye"></i> شاهد التكليف: ${viewers.length} / ${appData.members.filter(m => m.squadId === task.squadId).length} عضو</div>
                <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
                    <button class="btn btn-sm btn-primary" onclick="manageTaskSubmissions(${task.id})"><i class="fas fa-check-circle"></i> إدارة التسليمات (${submissions.filter(s => s.status === 'submitted').length})</button>
                    <button class="btn btn-sm btn-info" onclick="showTaskViewers(${task.id})"><i class="fas fa-eye"></i> من شاهد (${viewers.length})</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id})"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `;
    }).join('');
}

        function manageTaskSubmissions(taskId) {
            const task = appData.tasks.find(t => t.id === taskId);
            const squadMembers = appData.members.filter(m => m.squadId === task.squadId);
            const submissions = appData.taskSubmissions.filter(ts => ts.taskId === taskId);
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content" style="max-width:600px;">
                    <div class="modal-header"><h3><i class="fas fa-clipboard-list"></i> تسليمات تكليف: ${task.title}</h3><span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span></div>
                    <div style="max-height:400px; overflow-y:auto;">
                        ${squadMembers.map(member => {
                            const submission = submissions.find(s => s.memberId === member.id);
                            return `
                                <div style="background:#f8f9fa; padding:15px; border-radius:12px; margin-bottom:10px;">
                                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                                        <div><strong>${member.name}</strong> (${member.code}) - <span class="badge" style="background:${submission ? '#2ecc71' : '#e74c3c'};">${submission ? (submission.pointsAwarded ? 'تم التقييم' : 'تم التسليم') : 'لم يسلم بعد'}</span></div>
                                        ${submission && submission.status === 'submitted' && !submission.pointsAwarded ? 
                                            `<div><input type="number" id="points_${member.id}" placeholder="النقاط" value="${task.pointsValue}" style="width:80px; padding:5px;"> <button class="btn btn-sm btn-success" onclick="awardPoints(${taskId}, ${member.id})"><i class="fas fa-star"></i> منح النقاط</button></div>` : 
                                            submission && submission.pointsAwarded ? `<span class="badge" style="background:#2ecc71;">حصل على ${submission.pointsAwarded} نقطة</span>` : ''
                                        }
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        async function awardPoints(taskId, memberId) {
            const pointsInput = document.getElementById(`points_${memberId}`);
            const points = parseInt(pointsInput?.value) || 0;
            const submission = appData.taskSubmissions.find(ts => ts.taskId === taskId && ts.memberId === memberId);
            if (submission) {
                submission.pointsAwarded = points;
                submission.status = 'completed';
                submission.reviewedAt = new Date().toISOString();
                submission.reviewedBy = 'admin';
                const member = appData.members.find(m => m.id === memberId);
                member.points += points;
                if (member.points >= 200) member.rank = "قائد متميز";
                else if (member.points >= 100) member.rank = "قائد";
                else if (member.points >= 50) member.rank = "نائب قائد";
                await saveAllDataToFirebase();
                showToast(`تم منح ${points} نقطة للعضو ${member.name}`);
                manageTaskSubmissions(taskId);
                renderTasksListAdmin();
                renderAdminDashboard();
            }
        }

        function deleteTask(id) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content" style="max-width:400px;">
                    <div class="modal-header"><h3><i class="fas fa-trash-alt"></i> تأكيد الحذف</h3><span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span></div>
                    <p style="text-align:center; margin:20px 0;">هل أنت متأكد من حذف هذا التكليف؟</p>
                    <div style="display:flex; gap:10px; justify-content:center;">
                        <button class="btn btn-danger" onclick="confirmDeleteTask(${id}); this.closest('.modal').remove();">نعم، احذف</button>
                        <button class="btn btn-primary" onclick="this.closest('.modal').remove()">إلغاء</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        async function confirmDeleteTask(id) {
            appData.tasks = appData.tasks.filter(t => t.id !== id);
            appData.taskSubmissions = appData.taskSubmissions.filter(ts => ts.taskId !== id);
            await saveAllDataToFirebase();
            renderTasksListAdmin();
            renderAdminDashboard();
            showToast('تم حذف التكليف');
        }

        function changeMemberPage(page) {
            document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
            document.querySelector(`.sidebar-menu li[data-page="${page}"]`).classList.add('active');
            if (page === 'dashboard') renderMemberDashboard();
            else if (page === 'community') renderMemberCommunity();
            else if (page === 'tasks') renderMemberTasks();
            else if (page === 'forms') renderMemberFormsPage();
            else if (page === 'evaluationForms') renderMemberEvaluationFormsPage();
            closeSidebar();
        }

// دالة عرض إشعار التكليف الجديد (نسخة معدلة - زر تم فقط)
function showTaskNotification(newTasks) {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.style.zIndex = '3000';
    
    const tasksList = newTasks.map(t => `
        <div style="background:#f8f9fa; padding:12px; border-radius:12px; margin-bottom:10px; border-right:3px solid #d4a017;">
            <strong>📌 ${escapeHtml(t.title)}</strong><br>
            <small>${escapeHtml(t.description.substring(0, 100))}${t.description.length > 100 ? '...' : ''}</small><br>
            <small>🎯 ${t.pointsValue} نقطة | ⏰ ينتهي: ${new Date(t.endDate).toLocaleString('ar-EG')}</small>
        </div>
    `).join('');
    
    modal.innerHTML = `
        <div class="modal-content" style="max-width:500px; text-align:center;">
            <div style="font-size:50px; margin-bottom:15px;">📢</div>
            <h3 style="color:#1a472a; margin-bottom:10px;">✅ تم إضافة تكليف جديد!</h3>
            <p style="color:#666; margin-bottom:20px;">تم إضافة تكليف جديد إلى طليعتك. يمكنك الاطلاع عليه لاحقاً من صفحة التكاليف</p>

                ${tasksList}
            </div>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn btn-primary" onclick="this.closest('.modal').remove();" style="background:#d4a017;">
                    <i class="fas fa-check"></i> تم

}

        function loadMemberMessages() {
            const squadMessages = appData.messages.filter(m => m.squadId === currentUser.squadId || m.isBroadcast === true);
            squadMessages.sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
            const container = document.getElementById('memberChatMessages');
            if (!container) return;
            container.innerHTML = squadMessages.map(m => `
                <div class="message ${m.senderId === currentUser.id ? 'sent' : 'received'}">
                    <div class="sender"><i class="fas fa-user"></i> ${m.senderName} ${m.isBroadcast ? '<span style="background:#e74c3c; padding:2px 6px; border-radius:10px; font-size:10px;">بث عام</span>' : ''}</div>
                    <div class="text">${escapeHtml(m.text)}</div>
                    <div class="time">${new Date(m.timestamp).toLocaleString('ar-EG')}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function sendMemberMessage() {
            const input = document.getElementById('memberMessageInput');
            const text = input.value.trim();
            if (!text) return;
            const newMessage = {
                id: Date.now(),
                squadId: currentUser.squadId,
                senderId: currentUser.id,
                senderName: currentUser.name,
                text: text,
                timestamp: new Date().toISOString(),
                isBroadcast: false
            };
            appData.messages.push(newMessage);
            await saveAllDataToFirebase();
            input.value = '';
            loadMemberMessages();
            showToast('تم إرسال الرسالة');
        }

        // دالة منفصلة لتحديث حالة المشاهدة دون التسبب في حلقة لا نهائية
async function updateTaskSeenStatus() {
    let needsUpdate = false;
    
    appData.tasks.forEach(task => {
        if (task.squadId === currentUser.squadId) {
            if (!task.seenByMembers) task.seenByMembers = [];
            if (!task.seenByMembers.includes(currentUser.id)) {
                task.seenByMembers.push(currentUser.id);
                needsUpdate = true;
            }
        }
    });
    
    if (needsUpdate) {
        await saveAllDataToFirebase();
    }
}

// دالة إرسال فورم من القائد إلى أعضائه
async function sendFormToMyMembers(formId) {
    const leaderForm = appData.leaderForms?.find(lf => lf.formId === formId && lf.leaderId === currentUser.id);
    if (!leaderForm) {
        showToast('❌ الفورم غير موجود', 'error');
        return;
    }
    
    // جلب أعضاء القائد (حسب الفروع المسؤول عنها)
    const mySubBranchIds = currentUser.subBranchIds || [];
    const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.branchId));
    const mySquadIds = mySquads.map(s => s.id);
    const myMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    
    if (myMembers.length === 0) {
        showToast('⚠️ لا يوجد أعضاء في فروعك لإرسال الفورم إليهم', 'error');
        return;
    }
    
    const form = appData.forms.find(f => f.id === formId);
    if (!form) return;
    
    // تحديث leaderForm بأنه تم الإرسال للأعضاء
    leaderForm.sentToMembers = true;
    leaderForm.sentToMembersAt = new Date().toISOString();
    
    // إنشاء نسخة من الفورم لكل عضو
    if (!appData.memberForms) appData.memberForms = [];
    
    myMembers.forEach(member => {
        const alreadySent = appData.memberForms?.some(mf => mf.formId === formId && mf.memberId === member.id);
        if (!alreadySent) {
            appData.memberForms.push({
                id: Date.now() + Math.random(),
                formId: formId,
                memberId: member.id,
                leaderId: currentUser.id,
                sentAt: new Date().toISOString(),
                isAnswered: false,
                answers: [],
                formData: { ...form }
            });
        }
    });
    
    await saveAllDataToFirebase();
    showToast(`✅ تم إرسال الفورم "${form.title}" إلى ${myMembers.length} عضو`);
    
    // تحديث واجهة القائد إذا كانت مفتوحة
    if (typeof renderLeaderFormsPage === 'function') {
        renderLeaderFormsPage();
    }
}

        if (appData.members.some(m => m.username === username)) {
            showToast('اسم المستخدم موجود مسبقاً لدى عضو', 'error');
            return;
        }
        if (appData.joinRequests.some(r => r.username === username && r.status === 'pending')) {
            showToast('هذا الاسم موجود في طلب سابق لا يزال قيد المراجعة', 'error');
            return;
        }
        
        const subBranchId = parseInt(document.getElementById('reqSubBranchLogin').value);
        const subBranch = appData.subBranches.find(sb => sb.id === subBranchId);
        const squadId = parseInt(document.getElementById('reqSquadLogin').value);
        const squad = appData.squads.find(s => s.id === squadId);
        const squadType = document.getElementById('reqSquadTypeLogin').value || (squad ? squad.type : 'الكشافة');
        
        if (!subBranchId || !squadId) {
            showToast('الرجاء اختيار الهيئه والطليعة', 'error');
            return;
        }
        
        // تم حذف rank من هنا
        const newRequest = {
            id: Date.now(),
            name: document.getElementById('reqNameLogin').value,
            age: parseInt(document.getElementById('reqAgeLogin').value),
            phone: document.getElementById('reqPhoneLogin').value,
            // rank: تم إزالته
            branchId: subBranch.branchId,
            subBranchId: subBranchId,
            squadId: squadId,
            squadType: squadType,
            username: username,
            password: document.getElementById('reqPasswordLogin').value,
            status: 'pending',
            requestedAt: new Date().toISOString(),
            code: `KS${String(appData.members.length + 1).padStart(3, '0')}`
        };
        
        appData.joinRequests.push(newRequest);
        await saveAllDataToFirebase();
        
        const responsibleLeader = appData.leaders.find(leader => 
            leader.subBranchIds && leader.subBranchIds.includes(subBranchId)
        );
        const leaderName = responsibleLeader ? responsibleLeader.name : (squad ? squad.leader : 'القائد المسؤول');
        
        modal.remove();
        showCustomRequestMessage(leaderName, squad ? squad.name : 'الطليعة', subBranch ? subBranch.name : 'الهيئه');
    });
}

function renderLeaderboard() {
    const container = document.getElementById('leaderboardTableContainer');
    if (!container) return;
    
    // جلب البيانات بناءً على الفلاتر
    let filteredMembers = [...appData.members];
    
    // فلتر الفرع (إذا لم يكن 'all')
    if (currentBranchFilter !== 'all') {
        const branchId = parseInt(currentBranchFilter);
        filteredMembers = filteredMembers.filter(m => m.branchId === branchId);
    }
    
    // فلتر النوع (يعمل حتى مع اختيار جميع الفروع)
    if (currentTypeFilter !== 'all') {
        // جلب IDs الطلايع التي تطابق النوع المختار
        let squadIdsOfType = [];
        
        if (currentBranchFilter !== 'all') {
            // إذا كان فرع محدد، نجلب الطلايع من نفس الفرع
            squadIdsOfType = appData.squads
                .filter(s => s.type === currentTypeFilter && s.branchId == currentBranchFilter)
                .map(s => s.id);
        } else {
            // إذا كان جميع الفروع، نجلب الطلايع من كل الفروع
            squadIdsOfType = appData.squads
                .filter(s => s.type === currentTypeFilter)
                .map(s => s.id);
        }
        
        filteredMembers = filteredMembers.filter(m => squadIdsOfType.includes(m.squadId));
    }
    
    // ترتيب حسب النقاط (تنازلي)
    filteredMembers.sort((a, b) => b.points - a.points);
    
    // بناء HTML الجدول
    if (filteredMembers.length === 0) {
        container.innerHTML = '<div class="no-data"><i class="fas fa-info-circle"></i> لا توجد بيانات لعرضها</div>';
        return;
    }
    
    let tableHtml = `
        <div class="leaderboard-table-wrapper">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الاسم</th>
                        <th>الهيئه  / الطليعة</th>
                        <th>الرتبة</th>
                        <th><i class="fas fa-star"></i> النقاط</th>
                    </tr>
                </thead>
                <tbody>
    `;
    
    filteredMembers.forEach((member, index) => {
        const rank = index + 1;
        let rankClass = '';
        let rankDisplay = '';
        
        if (rank === 1) {
            rankClass = 'rank-1';
            rankDisplay = '🥇';
        } else if (rank === 2) {
            rankClass = 'rank-2';
            rankDisplay = '🥈';
        } else if (rank === 3) {
            rankClass = 'rank-3';
            rankDisplay = '🥉';
        } else {
            rankClass = 'rank-other';
            rankDisplay = rank;
        }
        
        // جلب معلومات الفرع والطليعة
        const squad = appData.squads.find(s => s.id === member.squadId);
        const branch = appData.branches.find(b => b.id === member.branchId);
        
        let locationText = '';
        if (currentBranchFilter !== 'all') {
            locationText = squad ? `${squad.name} ${squad.type ? `(${squad.type})` : ''}` : branch?.name || '-';
        } else {
            locationText = branch ? `${branch.name} - ${squad?.name || ''}` : squad?.name || '-';
        }
        
        tableHtml += `
            <tr>
                <td class="rank-cell">
                    <span class="rank-medal ${rankClass}">${rankDisplay}</span>
                </td>
                <td><strong>${escapeHtml(member.name)}</strong></td>
                <td>${escapeHtml(locationText)}</td>
                <td><span class="badge" style="background: #d4a01720; color: #1a472a; padding: 4px 10px;">${member.rank || 'عضو'}</span></td>
                <td><strong style="color: #d4a017; font-size: 18px;">${member.points}</strong></td>
            </tr>
        `;
    });
    
    tableHtml += `
                </tbody>
            </table>
        </div>
    `;
    
    container.innerHTML = tableHtml;
}

function updateLeaderboardFilters() {
    const branchSelect = document.getElementById('branchFilterLeaderboard');
    const typeSelect = document.getElementById('typeFilterLeaderboard');
    
    if (!branchSelect) return;
    
    currentBranchFilter = branchSelect.value;
    
    // تفعيل فلتر النوع دائماً (حتى عند اختيار جميع الفروع)
    typeSelect.disabled = false;
    
    // جلب جميع أنواع الفرق من كل الفروع (عند اختيار "جميع الفروع")
    let availableTypes = [];
    
    if (currentBranchFilter === 'all') {
        // إذا كان الكل، نجلب جميع الأنواع من كل الفروع
        availableTypes = [...new Set(
            appData.squads
                .filter(s => s.type)
                .map(s => s.type)
        )];
    } else {
        // إذا كان فرع محدد، نجلب الأنواع الموجودة في هذا الفرع فقط
        const branchId = parseInt(currentBranchFilter);
        availableTypes = [...new Set(
            appData.squads
                .filter(s => s.branchId === branchId && s.type)
                .map(s => s.type)
        )];
    }
    
    // حفظ القيمة الحالية مؤقتاً
    const oldTypeValue = typeSelect.value;
    
    // أسماء الأنواع المعروضة
   const typeNames = {
    'الكشافة': '⚜️ الكشافة',
    'المرشدات': '🌸 المرشدات',
    'الأشبال والزهرات': '🦁🌺 الأشبال والزهرات',
    'البراعم': '🌱 البراعم'
};
    
    // بناء خيارات فلتر النوع
    typeSelect.innerHTML = '<option value="all">🎯 جميع المراحل</option>';
    
    if (availableTypes.length > 0) {
        availableTypes.forEach(type => {
            typeSelect.innerHTML += `<option value="${type}">${typeNames[type] || type}</option>`;
        });
    } else {
        // إذا لم تكن هناك أنواع، نضيف الخيارات الافتراضية
        Object.entries(typeNames).forEach(([key, value]) => {
            typeSelect.innerHTML += `<option value="${key}">${value}</option>`;
        });
    }
    
    // استعادة القيمة إذا كانت لا تزال موجودة
    if (availableTypes.includes(oldTypeValue) || oldTypeValue === 'all') {
        typeSelect.value = oldTypeValue;
        currentTypeFilter = oldTypeValue;
    } else {
        typeSelect.value = 'all';
        currentTypeFilter = 'all';
    }
    
    // تحديث الجدول
    renderLeaderboard();
}

// ==================== تشغيل التطبيق ====================
window.startApp = async function() {
    // تحميل جميع البيانات من Firebase
    await loadAllDataFromFirebase();
    
    // محاولة تحميل بيانات القائد العام المحفوظة (إذا وجدت)
    const adminCreds = await loadAdminCredentialsFromFirebase();
    
    // تخزين بيانات القائد العام في متغير عام للاستخدام
    window.adminCredentials = adminCreds;
    
    // بدء الاستماع للتحديثات المباشرة من Firebase
    listenForRealTimeUpdates();
    
    // عرض صفحة الهبوط (Landing Page)
    renderLandingPage();
    
    // إضافة الزر الثابت (شعار المجموعة)
    addFixedLogoButton();
    
    // تهيئة الوضع (داكن/فاتح)
    initTheme();
    
    console.log('✅ تم تشغيل التطبيق بنجاح');
    console.log('🔐 بيانات القائد العام الحالية:', adminCreds);
};

// دالة عرض صفحة فورمات التقييم للقائد
window.renderLeaderEvaluationFormsPage = function() {
    const container = document.getElementById('leaderPageContent');
    if (!container) return;
    
    if (!appData.leaderEvaluationForms) appData.leaderEvaluationForms = [];
    if (!appData.evaluationForms) appData.evaluationForms = [];
    
    const leaderForms = appData.leaderEvaluationForms.filter(lf => lf.leaderId === currentUser.id);
    
    if (leaderForms.length === 0) {
        container.innerHTML = `
            <div class="card">
                <h3><i class="fas fa-star"></i> فورمات التقييم المستلمة</h3>
                <p style="text-align:center; color:#999; padding:20px;">⚠️ لا توجد فورمات تقييم مستلمة بعد</p>
            </div>
        `;
        return;
    }
    
    let formsHtml = '';
    for (const lf of leaderForms) {
        let form = appData.evaluationForms.find(f => f.id === lf.formId);
        if (!form && lf.formData) form = lf.formData;
        if (!form) continue;
        
        formsHtml += `
            <div style="background:#f8f9fa; border-radius:15px; padding:15px; margin-bottom:15px; border-right:4px solid ${lf.sentToMembers ? '#2ecc71' : '#d4a017'}">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                    <div>
                        <strong><i class="fas fa-star"></i> ${escapeHtml(form.title)}</strong>
                        <br>
                        <small><i class="fas fa-tag"></i> نوع الفريق: ${form.squadType || 'الكل'}</small>
                        <br>
                        <small><i class="fas fa-calendar"></i> تاريخ الاستلام: ${new Date(lf.sentAt).toLocaleString('ar-EG')}</small>
                    </div>
                    <div style="display:flex; gap:8px; margin-top:10px;">
                        <button class="btn btn-sm btn-info" onclick="viewLeaderEvaluationFormDetails(${lf.formId})">
                            <i class="fas fa-eye"></i> عرض
                        </button>
                        <button class="btn btn-sm btn-primary" onclick="showEvaluationResultsForLeader(${lf.formId})">
                            <i class="fas fa-chart-bar"></i> النتائج
                        </button>
                        ${!lf.sentToMembers ? 
                            `<button class="btn btn-sm btn-success" onclick="showSendEvaluationFormDestinationModal(${lf.formId})">
                                <i class="fas fa-paper-plane"></i> إرسال للأعضاء
                            </button>` : 
                            `<span class="badge" style="background:#2ecc71;">✓ تم الإرسال للأعضاء</span>`
                        }
                    </div>
                </div>
            </div>
        `;
    }
    
    container.innerHTML = `
        <div class="card">
            <h3><i class="fas fa-star"></i> فورمات التقييم المستلمة</h3>
            <div id="leaderEvaluationFormsList">${formsHtml}</div>
        </div>
    `;
};

// دالة عرض تفاصيل فورم التقييم
window.viewLeaderEvaluationFormDetails = function(formId) {
    if (!appData.leaderEvaluationForms) appData.leaderEvaluationForms = [];
    if (!appData.evaluationForms) appData.evaluationForms = [];
    
    const leaderForm = appData.leaderEvaluationForms.find(lf => lf.formId === formId && lf.leaderId === currentUser.id);
    if (!leaderForm) {
        showToast('❌ فورم التقييم غير موجود', 'error');
        return;
    }
    
    let form = appData.evaluationForms.find(f => f.id === formId);
    if (!form && leaderForm.formData) form = leaderForm.formData;
    if (!form) {
        showToast('❌ بيانات الفورم غير موجودة', 'error');
        return;
    }
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    
    let questionsHtml = '';
    if (form.questions && form.questions.length > 0) {
        form.questions.forEach((q, idx) => {
            questionsHtml += `
                <div style="background:#f8f9fa; border-radius:12px; padding:12px; margin-bottom:12px;">
                    <strong>${idx + 1}. ${escapeHtml(q.text)}</strong>
                    <p style="color:#666; font-size:12px;">(سؤال نصي - إجابة مفتوحة)</p>
                </div>
            `;
        });
    } else {
        questionsHtml = '<p>لا توجد أسئلة إضافية</p>';
    }
    
    modal.innerHTML = `
        <div class="modal-content" style="max-width:600px; max-height:80vh; overflow-y:auto;">
            <div class="modal-header">
                <h3><i class="fas fa-star"></i> ${escapeHtml(form.title)}</h3>
                <span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span>
            </div>
            <p><i class="fas fa-tag"></i> نوع الفريق: ${form.squadType || 'الكل'}</p>
            <p><i class="fas fa-star"></i> عنوان التقييم: ${escapeHtml(form.starRatingTitle || 'تقييم عام')}</p>
            ${form.description ? `<p>${escapeHtml(form.description)}</p>` : ''}
            <hr>
            <h4>الأسئلة الإضافية:</h4>
            ${questionsHtml}
            <div style="text-align:center; margin-top:20px;">
                <button class="btn btn-primary" onclick="this.closest('.modal').remove()">إغلاق</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
};

// دالة عرض نتائج فورم التقييم للقائد
window.showEvaluationResultsForLeader = function(formId) {
    if (!appData.evaluationForms) appData.evaluationForms = [];
    
    let form = appData.evaluationForms.find(f => f.id === formId);
    if (!form) {
        const leaderForm = (appData.leaderEvaluationForms || []).find(lf => lf.formId === formId && lf.leaderId === currentUser.id);
        if (leaderForm && leaderForm.formData) form = leaderForm.formData;
    }
    if (!form) {
        showToast('❌ فورم التقييم غير موجود', 'error');
        return;
    }
    
    const mySubBranchIds = currentUser.subBranchIds || [];
    const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.branchId));
    const mySquadIds = mySquads.map(s => s.id);
    const myMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    const myMemberIds = myMembers.map(m => m.id);
    
    const answers = (appData.memberEvaluationAnswers || []).filter(a => a.formId === formId && myMemberIds.includes(a.memberId));
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    
    let resultsHtml = '';
    if (answers.length === 0) {
        resultsHtml = '<p style="text-align:center;">لا توجد إجابات حتى الآن</p>';
    } else {
        const avgStars = (answers.reduce((a,b) => a + b.starRating, 0) / answers.length).toFixed(1);
        resultsHtml = `
            <div style="background:#e8f5e9; padding:15px; border-radius:12px; margin-bottom:20px; text-align:center;">
                <p>عدد المشاركين: <strong>${answers.length}</strong> من أصل ${myMembers.length} عضو</p>
                <p>متوسط التقييم: <strong style="font-size:24px; color:#d4a017;">${avgStars}</strong> / 5</p>
            </div>
            ${answers.map(ans => {
                const member = appData.members.find(m => m.id === ans.memberId);
                return `
                    <div style="background:#f8f9fa; border-radius:12px; padding:15px; margin-bottom:12px;">
                        <div><strong>${member?.name || 'عضو غير معروف'}</strong></div>
                        <div>التقييم: ${'⭐'.repeat(ans.starRating)} (${ans.starRating}/5)</div>
                        ${ans.answers && ans.answers.length > 0 ? `<div>الإجابات: ${ans.answers.map(a => a.answer).join(', ')}</div>` : ''}
                    </div>
                `;
            }).join('')}
        `;
    }
    
    modal.innerHTML = `
        <div class="modal-content" style="max-width:700px; max-height:85vh; overflow-y:auto;">
            <div class="modal-header">
                <h3><i class="fas fa-chart-bar"></i> نتائج فورم التقييم: ${escapeHtml(form.title)}</h3>
                <span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span>
            </div>
            ${resultsHtml}
            <div style="text-align:center; margin-top:20px;">
                <button class="btn btn-primary" onclick="this.closest('.modal').remove()">إغلاق</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
};

// دالة إرسال فورم التقييم للأعضاء
window.showSendEvaluationFormDestinationModal = function(formId) {
    if (!appData.leaderEvaluationForms) appData.leaderEvaluationForms = [];
    
    const leaderForm = appData.leaderEvaluationForms.find(lf => lf.formId === formId && lf.leaderId === currentUser.id);
    if (!leaderForm) {
        showToast('❌ فورم التقييم غير موجود', 'error');
        return;
    }
    
    let form = leaderForm.formData;
    if (!form) {
        if (!appData.evaluationForms) appData.evaluationForms = [];
        form = appData.evaluationForms.find(f => f.id === formId);
    }
    if (!form) {
        showToast('❌ بيانات الفورم غير موجودة', 'error');
        return;
    }
    
    const mySubBranchIds = currentUser.subBranchIds || [];
    const myBranchIds = [...new Set(appData.subBranches
        .filter(sb => mySubBranchIds.includes(sb.id))
        .map(sb => sb.branchId)
    )];
    const mySubBranches = appData.subBranches.filter(sb => mySubBranchIds.includes(sb.id));
    const mySquads = appData.squads.filter(s => myBranchIds.includes(s.branchId));
    
    let branchesOptions = '<option value="">-- اختر المجموعه --</option>';
    myBranchIds.forEach(branchId => {
        const branch = appData.branches.find(b => b.id === branchId);
        if (branch) branchesOptions += `<option value="${branch.id}">🏢 ${branch.name}</option>`;
    });
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content" style="max-width:500px;">
            <div class="modal-header">
                <h3><i class="fas fa-paper-plane"></i> إرسال فورم التقييم: ${escapeHtml(form.title)}</h3>
                <span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span>
            </div>
            <form id="sendEvalForm">
                <div class="input-group"><label>اختر المجموعه</label><select id="evalBranch" required style="width:100%; padding:10px;">${branchesOptions}</select></div>
                <div class="input-group"><label>اختر الهيئه</label><select id="evalSubBranch" required style="width:100%; padding:10px;"><option value="">-- اختر المجموعه أولاً --</option></select></div>
                <div class="input-group"><label>اختر الطليعة</label><select id="evalSquad" style="width:100%; padding:10px;"><option value="all">-- جميع الطلايع --</option></select></div>
                <div id="evalCount" style="background:#e8f5e9; padding:10px; border-radius:10px; text-align:center;">سيتم الإرسال إلى <span id="evalCountNum">0</span> عضو</div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button type="button" class="btn btn-secondary" onclick="this.closest('.modal').remove()">إلغاء</button>
                    <button type="submit" class="btn btn-primary">إرسال</button>
                </div>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    const branchSel = document.getElementById('evalBranch');
    const subBranchSel = document.getElementById('evalSubBranch');
    const squadSel = document.getElementById('evalSquad');
    const countSpan = document.getElementById('evalCountNum');
    
    function updateCount() {
        const subBranchId = parseInt(subBranchSel.value);
        const squadId = squadSel.value;
        let count = 0;
        if (subBranchId) {
            if (squadId === 'all') count = appData.members.filter(m => m.subBranchId === subBranchId).length;
            else count = appData.members.filter(m => m.squadId == squadId).length;
        }
        countSpan.textContent = count;
    }
    
    function updateSubBranches() {
        const branchId = parseInt(branchSel.value);
        if (branchId) {
            const filtered = mySubBranches.filter(sb => sb.branchId === branchId);
            subBranchSel.innerHTML = '<option value="">-- اختر الهيئه --</option>' + filtered.map(sb => `<option value="${sb.id}">${sb.name}</option>`).join('');
            squadSel.innerHTML = '<option value="all">-- جميع الطلايع --</option>';
        } else {
            subBranchSel.innerHTML = '<option value="">-- اختر المجموعه أولاً --</option>';
        }
        updateCount();
    }
    
    function updateSquads() {
        const subBranchId = parseInt(subBranchSel.value);
        if (subBranchId) {
            const selected = mySubBranches.find(sb => sb.id === subBranchId);
            if (selected) {
                const squads = mySquads.filter(s => s.branchId === selected.branchId);
                squadSel.innerHTML = '<option value="all">-- جميع الطلايع --</option>' + squads.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            }
        }
        updateCount();
    }
    
    branchSel.onchange = () => { updateSubBranches(); updateCount(); };
    subBranchSel.onchange = () => { updateSquads(); updateCount(); };
    squadSel.onchange = updateCount;
    updateSubBranches();
    
    document.getElementById('sendEvalForm').onsubmit = async (e) => {
        e.preventDefault();
        const subBranchId = parseInt(subBranchSel.value);
        const squadId = squadSel.value;
        if (!subBranchId) { showToast('الرجاء اختيار الهيئه', 'error'); return; }
        
        let targetMembers = squadId === 'all' ? appData.members.filter(m => m.subBranchId === subBranchId) : appData.members.filter(m => m.squadId == squadId);
        if (targetMembers.length === 0) { showToast('⚠️ لا يوجد أعضاء', 'error'); return; }
        
        const leaderFormData = appData.leaderEvaluationForms.find(lf => lf.formId === formId && lf.leaderId === currentUser.id);
        if (leaderFormData) leaderFormData.sentToMembers = true;
        
        if (!appData.memberEvaluationForms) appData.memberEvaluationForms = [];
        targetMembers.forEach(member => {
            appData.memberEvaluationForms.push({
                id: Date.now() + Math.random(),
                formId: formId,
                memberId: member.id,
                leaderId: currentUser.id,
                sentAt: new Date().toISOString(),
                isAnswered: false,
                starRating: null,
                answers: [],
                formData: form
            });
        });
        
        await saveAllDataToFirebase();
        showToast(`✅ تم إرسال الفورم إلى ${targetMembers.length} عضو`);
        modal.remove();
        if (typeof window.renderLeaderEvaluationFormsPage === 'function') window.renderLeaderEvaluationFormsPage();
    };
    window.showFormRecipients = showFormRecipients;
window.showFormAnswers = showFormAnswers;
};

console.log('✅ تم تحديث جميع دوال فورمات التقييم بنجاح');
// استدعاء التطبيق
startApp();
    </script>
