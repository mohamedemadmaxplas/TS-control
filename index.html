<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Scout DoJo-Tecno Shark</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
      /* ==================== RESET & GLOBAL ==================== */
/* ==================== RESET & GLOBAL ==================== */
* {
    margin: 0;
    padding: 0; 
    box-sizing: border-box;
}

body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #1a472a, #0d2818, #0a1f12);
    min-height: 100vh;
    direction: rtl;
    overflow-x: hidden;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #2d5a3f; border-radius: 10px; }
::-webkit-scrollbar-thumb { background: #d4a017; border-radius: 10px; }

/* ==================== SIDEBAR ==================== */
.sidebar-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 999;
    visibility: hidden;
    opacity: 0;
    transition: 0.3s ease;
}

.sidebar-overlay.active {
    visibility: visible;
    opacity: 1;
}

.sidebar {
    position: fixed;
    top: 0;
    right: -280px;
    width: 260px;
    height: 100%;
    background: linear-gradient(180deg, #1a472a, #0d2818);
    z-index: 1000;
    transition: 0.3s ease;
    padding: 15px 0;
    box-shadow: -5px 0 30px rgba(0,0,0,0.3);
    overflow-y: auto;
    border-left: 1px solid rgba(212,160,23,0.3);
}

.sidebar.open { right: 0; }

.sidebar-header {
    padding: 15px 20px;
    border-bottom: 1px solid rgba(212,160,23,0.3);
    margin-bottom: 10px;
    text-align: center;
}

.sidebar-header h3 { 
    color: #d4a017; 
    font-size: 18px; 
    margin: 0;
}

.sidebar-header p { 
    color: rgba(255,255,255,0.7); 
    font-size: 11px; 
    margin: 5px 0 0;
}

.sidebar-menu {
    list-style: none;
    padding: 0;
}

.sidebar-menu li { margin-bottom: 5px; }

.sidebar-menu li a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    transition: 0.3s;
    cursor: pointer;
    font-weight: 500;
    font-size: 14px;
}

.sidebar-menu li a i {
    width: 24px;
    font-size: 18px;
    color: #d4a017;
}

.sidebar-menu li a:hover {
    background: rgba(212,160,23,0.15);
    padding-right: 30px;
    color: white;
}

.sidebar-menu li.active a {
    background: linear-gradient(90deg, #d4a017, #b8860b);
    color: #0d2818;
}

.sidebar-menu li.active a i { color: #0d2818; }

/* ==================== HAMBURGER BUTTON ==================== */
.hamburger {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 48px;
    height: 48px;
    background: white;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    z-index: 1001;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    transition: 0.3s;
    border: 1px solid #d4a017;
}

.hamburger:hover { transform: scale(1.05); border-color: #d4a017; background: #fff; }

.hamburger span {
    width: 28px;
    height: 3px;
    background: #d4a017;
    border-radius: 3px;
    transition: 0.3s;
}

.hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }

/* ==================== HEADER ==================== */
.header {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 12px 20px;
    margin-right: 80px;
    margin-left: 20px;
    margin-top: 20px;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    border: 1px solid rgba(212,160,23,0.3);
}

.logo {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
}

.logo i { font-size: 24px; color: #d4a017; }
.logo h1 { font-size: 18px; color: #1a472a; }
.logo p { font-size: 9px; color: #666; }

.user-info {
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0,0,0,0.05);
    padding: 5px 12px;
    border-radius: 40px;
    flex-shrink: 0;
}

.user-info i { font-size: 14px; color: #d4a017; }
.user-info span { font-size: 13px; font-weight: 600; color: #1a472a; }

.logout-btn {
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    color: white;
    border: none;
    padding: 5px 12px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
}

.logout-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(192,57,43,0.3); }

/* ==================== MAIN CONTENT ==================== */
.main-content {
    margin-right: 80px;
    margin-left: 20px;
    margin-top: 20px;
    padding: 15px;
    min-height: calc(100vh - 140px);
}

/* ==================== STATS CARDS ==================== */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    background: rgba(255,255,255,0.95);
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    transition: 0.3s;
    border-right: 4px solid #d4a017;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.stat-card:hover { transform: translateY(-5px); background: white; }
.stat-card i { font-size: 40px; color: #d4a017; margin-bottom: 10px; }
.stat-card .number { font-size: 32px; font-weight: bold; color: #1a472a; }
.stat-card .label { font-size: 14px; color: #666; }

/* ==================== CARDS ==================== */
.card {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 25px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.card h3 {
    color: #1a472a;
    margin-bottom: 18px;
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 2px solid #d4a017;
    padding-bottom: 10px;
}

/* ==================== BUTTONS ==================== */
.btn {
    padding: 10px 22px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-weight: 600;
    transition: 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-primary { background: #d4a017; color: white; }
.btn-success { background: #2ecc71; color: white; }
.btn-danger { background: #e74c3c; color: white; }
.btn-warning { background: #f39c12; color: white; }
.btn-info { background: #3498db; color: white; }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn:hover { transform: translateY(-2px); }

/* ==================== SQUAD FILTER ==================== */
.squad-filter {
    padding: 15px;
    background: rgba(255,255,255,0.9);
    border-radius: 15px;
    margin-bottom: 20px;
    display: flex;
    gap: 15px;
    align-items: center;
    flex-wrap: wrap;
}

.squad-filter select, .squad-filter input {
    flex: 1;
    padding: 10px;
    border: 2px solid #e0e0e0;
    border-radius: 30px;
    font-family: 'Cairo', sans-serif;
}

.broadcast-btn {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.3s;
}

.broadcast-btn:hover { transform: translateY(-2px); }

/* ==================== TABLES ==================== */
.data-table {
    width: 100%;
    border-collapse: collapse;
    overflow-x: auto;
    display: block;
}

.data-table th, .data-table td {
    padding: 12px;
    text-align: right;
    border-bottom: 1px solid #eee;
}

.data-table th {
    background: #1a472a;
    color: white;
    font-weight: 600;
}

.data-table tr:hover { background: #f5f5f5; }

/* ==================== CHAT ==================== */
.chat-container {
    height: 500px;
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    overflow: hidden;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #f8f9fa;
}

.message {
    max-width: 70%;
    padding: 10px 15px;
    border-radius: 18px;
    position: relative;
}

.message.sent {
    background: linear-gradient(135deg, #d4a017, #b8860b);
    color: white;
    align-self: flex-start;
    border-bottom-right-radius: 5px;
}

.message.received {
    background: white;
    color: #333;
    align-self: flex-end;
    border-bottom-left-radius: 5px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.message .sender { font-size: 11px; font-weight: bold; margin-bottom: 4px; opacity: 0.8; }
.message .time { font-size: 9px; margin-top: 4px; text-align: left; opacity: 0.6; }

.chat-input-area {
    display: flex;
    gap: 10px;
    padding: 15px;
    background: white;
    border-top: 1px solid #eee;
}

.chat-input-area input {
    flex: 1;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 30px;
    font-family: 'Cairo', sans-serif;
}

.chat-input-area input:focus { outline: none; border-color: #d4a017; }

.chat-input-area button {
    padding: 10px 20px;
    background: #d4a017;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
}

/* ==================== TASKS ==================== */
.task-item {
    background: #f8f9fa;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 12px;
    border-right: 4px solid #d4a017;
}

.task-pending { background: #fff3cd; border-right-color: #f39c12; }
.task-completed { background: #e8f5e9; border-right-color: #2ecc71; }

.task-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 8px;
}

.task-title { font-weight: bold; font-size: 16px; }
.task-points { background: #d4a017; color: white; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
.task-description { font-size: 13px; color: #666; margin-bottom: 8px; }
.task-meta { font-size: 11px; color: #999; }

.complete-task-btn {
    background: #2ecc71;
    color: white;
    border: none;
    padding: 6px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    transition: 0.3s;
}

.complete-task-btn:hover { transform: translateY(-2px); }

/* ==================== MODAL ==================== */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(5px);
    z-index: 2000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    border-radius: 25px;
    padding: 25px;
    max-width: 550px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
}

@keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 2px solid #d4a017;
    padding-bottom: 12px;
}

.modal-header h3 { color: #1a472a; }

.close-modal {
    cursor: pointer;
    font-size: 24px;
    transition: 0.3s;
}

.close-modal:hover { color: #e74c3c; transform: rotate(90deg); }

/* ==================== FORM INPUTS ==================== */
.input-group { margin-bottom: 18px; }
.input-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; }
.input-group input, .input-group textarea, .input-group select {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
}
.input-group input:focus, .input-group select:focus { outline: none; border-color: #d4a017; }

.code-generator {
    display: flex;
    gap: 10px;
    align-items: center;
}
.code-generator input { flex: 1; }

/* ==================== BADGES ==================== */
.badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
}
.badge-active { background: #2ecc71; color: white; }
.badge-inactive { background: #e74c3c; color: white; }

/* ==================== DETAILS GRID ==================== */
.details-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-bottom: 20px;
}

.detail-item {
    background: #f8f9fa;
    padding: 12px;
    border-radius: 12px;
}

.detail-label { font-size: 11px; color: #999; margin-bottom: 4px; }
.detail-value { font-size: 16px; font-weight: 600; color: #1a472a; }

/* ==================== FOOTER ==================== */
.footer {
    background: rgba(255,255,255,0.9);
    color: #666;
    padding: 15px;
    text-align: center;
    margin-top: 30px;
    border-top: 1px solid rgba(212,160,23,0.2);
}

/* ==================== LOGIN PAGE ==================== */
.login-container {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1a472a, #0d2818);
}

.login-box {
    background: white;
    border-radius: 30px;
    padding: 40px;
    width: 400px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.login-box i { font-size: 60px; color: #d4a017; margin-bottom: 15px; }
.login-box h2 { color: #1a472a; margin-bottom: 25px; }



/* ==================== GLOBAL LOGO (Fixed) ==================== */
.global-logo {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 10000;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    padding: 6px 12px;
    border-radius: 40px;
    border: 1px solid rgba(212,160,23,0.4);
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: 0.3s;
}

.global-logo:hover {
    transform: translateX(-3px);
    border-color: #d4a017;
}

.global-logo-img {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
}

.global-logo-text {
    font-weight: bold;
    color: #1a472a;
    font-size: 11px;
    white-space: nowrap;
}

/* ==================== SCOUT LOGO HEADER (Login Page) ==================== */
.scout-logo-header {
    position: fixed;
    top: 20px;
    right: 20px;
    left: auto;
    z-index: 1002;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: 0.3s;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(8px);
    padding: 6px 18px 6px 20px;
    border-radius: 50px;
    border: 1px solid rgba(212, 160, 23, 0.5);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

.scout-logo-header .logo-circle {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    overflow: hidden;
    background: #d4a017;
    display: flex;
    align-items: center;
    justify-content: center;
}

.scout-logo-header .logo-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.scout-logo-header .logo-text .logo-title {
    font-size: 16px;
    font-weight: bold;
    color: #1a472a;
    line-height: 1.2;
}

.scout-logo-header .logo-text .logo-subtitle {
    font-size: 11px;
    color: #666;
}

/* ==================== RESPONSIVE (MOBILE) ==================== */
@media (max-width: 768px) {
    /* General */
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .main-content { margin-right: 15px; margin-left: 15px; padding: 10px; }
    .header { margin-right: 65px; margin-left: 10px; padding: 8px 12px; flex-wrap: wrap; }
    .hamburger { width: 38px; height: 38px; top: 15px; right: 15px; }
    .hamburger span { width: 22px; height: 2.5px; }
    .details-grid { grid-template-columns: 1fr; }
    .message { max-width: 85%; }
    
    /* Header Elements */
    .logo i { font-size: 20px; }
    .logo h1 { font-size: 14px; }
    .logo p { font-size: 8px; display: none; }
    .user-info { padding: 3px 10px; gap: 6px; }
    .user-info span { font-size: 11px; }
    .logout-btn { padding: 4px 10px; font-size: 10px; }
    
    /* Stats Cards */
    .stat-card { padding: 12px; }
    .stat-card i { font-size: 28px; }
    .stat-card .number { font-size: 22px; }
    .stat-card .label { font-size: 11px; }
    
    /* Tables */
    .data-table { font-size: 11px; }
    .data-table th, .data-table td { padding: 6px; }
    
    /* Buttons */
    .btn { padding: 6px 12px; font-size: 12px; }
    .btn-sm { padding: 4px 8px; font-size: 10px; }
    
    /* Tasks */
    .task-item { padding: 10px; }
    .task-title { font-size: 14px; }
    .task-points { font-size: 10px; }
    
    /* Global Logo */
    .global-logo { padding: 4px 10px; top: 12px; left: 12px; }
    .global-logo-img { width: 28px; height: 28px; }
    .global-logo-text { font-size: 9px; }
    
    /* Landing Page */
    .hero-content { padding: 30px 25px; margin: 0 15px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); }
    .organization-name h2 { font-size: 22px; }
    .main-headline { font-size: 20px; }
    .features-grid-landing { grid-template-columns: 1fr; gap: 10px; }
    .login-main-btn { padding: 12px 30px; font-size: 16px; }
    
    .landing-header { padding: 10px 15px; }
    .landing-header-logo img { width: 35px; height: 35px; }
    .logo-text-header .logo-title { font-size: 12px; }
    .logo-text-header .logo-subtitle { font-size: 9px; }
    .landing-header-login-btn { padding: 6px 15px; font-size: 12px; }
    
    /* Tent & Flame */
    .floating-tent { width: 80px; height: 80px; }
    .floating-tent i { font-size: 45px; }
    .scout-image-right.show { width: 200px; height: 180px; }
    .flame-icon { font-size: 45px; }
    .flame-image.show { width: 200px; height: 180px; }
    
    /* Hide side animations on mobile */
    .tent-animation-area,
    .flame-animation-area {
        display: none;
    }
    
    /* Login Box */
    .login-box { width: 90%; padding: 25px 20px; }
    .login-box i { font-size: 45px; }
    .login-box h2 { font-size: 22px; }
    
    /* Sidebar */
    .sidebar { width: 260px; }
}

/* Very Small Screens */
@media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: stretch; text-align: center; }
    .user-info { justify-content: center; }
    .main-content { margin-right: 10px; margin-left: 10px; }
    .sidebar { width: 220px; right: -220px; }
    
    .scout-image-right.show { width: 240px; height: 170px; }
    .flame-image.show { width: 240px; height: 170px; }
    .floating-tent { width: 60px; height: 60px; }
    .floating-tent i { font-size: 35px; }
    .hero-content { padding: 20px; }
    .organization-name h2 { font-size: 20px; }
}
/* زر تسجيل الخروج في المينيو الجانبي */
.sidebar-menu li:last-child a {
    color: #e74c3c !important;
}
.sidebar-menu li:last-child a i {
    color: #e74c3c !important;
}
.sidebar-menu li:last-child a:hover {
    background: rgba(231, 76, 60, 0.2);
}
/* ==================== PAGE LOAD ANIMATIONS ==================== */

/* Animation keyframes */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInLeft {
    from {
        opacity: 0;
        transform: translateX(-30px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes fadeInRight {
    from {
        opacity: 0;
        transform: translateX(30px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes scaleIn {
    from {
        opacity: 0;
        transform: scale(0.8);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

@keyframes slideInDown {
    from {
        opacity: 0;
        transform: translateY(-50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes zoomIn {
    from {
        opacity: 0;
        transform: scale(0.5);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

@keyframes bounceIn {
    0% {
        opacity: 0;
        transform: scale(0.3);
    }
    50% {
        opacity: 1;
        transform: scale(1.05);
    }
    70% {
        transform: scale(0.9);
    }
    100% {
        transform: scale(1);
    }
}

@keyframes flipIn {
    from {
        opacity: 0;
        transform: perspective(400px) rotateX(90deg);
    }
    to {
        opacity: 1;
        transform: perspective(400px) rotateX(0);
    }
}

/* تطبيق الأنيميشن على العناصر */

/* الهيدر */
.header {
    animation: slideInDown 0.6s ease forwards;
}

/* بطاقات الإحصائيات (تظهر واحدة تلو الأخرى) */
.stat-card {
    opacity: 0;
    animation: fadeInUp 0.5s ease forwards;
}

.stat-card:nth-child(1) { animation-delay: 0.1s; }
.stat-card:nth-child(2) { animation-delay: 0.2s; }
.stat-card:nth-child(3) { animation-delay: 0.3s; }
.stat-card:nth-child(4) { animation-delay: 0.4s; }
.stat-card:nth-child(5) { animation-delay: 0.5s; }
.stat-card:nth-child(6) { animation-delay: 0.6s; }

/* الكروت (Cards) */
.card {
    opacity: 0;
    animation: fadeInUp 0.5s ease forwards;
}

.card:nth-child(1) { animation-delay: 0.15s; }
.card:nth-child(2) { animation-delay: 0.3s; }
.card:nth-child(3) { animation-delay: 0.45s; }
.card:nth-child(4) { animation-delay: 0.6s; }
.card:nth-child(5) { animation-delay: 0.75s; }

/* الأزرار */
.btn, .broadcast-btn, .logout-btn {
    opacity: 0;
    animation: scaleIn 0.4s ease forwards;
}

.btn:nth-child(1) { animation-delay: 0.1s; }
.btn:nth-child(2) { animation-delay: 0.2s; }
.btn:nth-child(3) { animation-delay: 0.3s; }

/* عناصر الجدول (الصفوف تظهر واحدة تلو الأخرى) */
.data-table tr {
    opacity: 0;
    animation: fadeInRight 0.3s ease forwards;
}

.data-table tr:nth-child(1) { animation-delay: 0.05s; }
.data-table tr:nth-child(2) { animation-delay: 0.1s; }
.data-table tr:nth-child(3) { animation-delay: 0.15s; }
.data-table tr:nth-child(4) { animation-delay: 0.2s; }
.data-table tr:nth-child(5) { animation-delay: 0.25s; }
.data-table tr:nth-child(6) { animation-delay: 0.3s; }
.data-table tr:nth-child(7) { animation-delay: 0.35s; }
.data-table tr:nth-child(8) { animation-delay: 0.4s; }
.data-table tr:nth-child(9) { animation-delay: 0.45s; }
.data-table tr:nth-child(10) { animation-delay: 0.5s; }

/* عناصر المهام (Task items) */
.task-item {
    opacity: 0;
    animation: fadeInLeft 0.4s ease forwards;
}

.task-item:nth-child(1) { animation-delay: 0.1s; }
.task-item:nth-child(2) { animation-delay: 0.2s; }
.task-item:nth-child(3) { animation-delay: 0.3s; }
.task-item:nth-child(4) { animation-delay: 0.4s; }
.task-item:nth-child(5) { animation-delay: 0.5s; }

/* رسائل الدردشة */
.message {
    opacity: 0;
    animation: fadeInUp 0.3s ease forwards;
}

.message:nth-child(1) { animation-delay: 0.05s; }
.message:nth-child(2) { animation-delay: 0.1s; }
.message:nth-child(3) { animation-delay: 0.15s; }
.message:nth-child(4) { animation-delay: 0.2s; }
.message:nth-child(5) { animation-delay: 0.25s; }

/* عناصر الفلتر */
.squad-filter {
    opacity: 0;
    animation: slideInDown 0.5s ease forwards;
    animation-delay: 0.1s;
}

/* عناصر السايدبار */
.sidebar {
    animation: fadeInRight 0.4s ease;
}

.sidebar-menu li {
    opacity: 0;
    animation: fadeInLeft 0.3s ease forwards;
}

.sidebar-menu li:nth-child(1) { animation-delay: 0.05s; }
.sidebar-menu li:nth-child(2) { animation-delay: 0.1s; }
.sidebar-menu li:nth-child(3) { animation-delay: 0.15s; }
.sidebar-menu li:nth-child(4) { animation-delay: 0.2s; }
.sidebar-menu li:nth-child(5) { animation-delay: 0.25s; }
.sidebar-menu li:nth-child(6) { animation-delay: 0.3s; }

/* الفوتر */
.footer {
    opacity: 0;
    animation: fadeInUp 0.5s ease forwards;
    animation-delay: 0.3s;
}

/* عناصر المودال */
.modal-content {
    animation: zoomIn 0.3s ease forwards;
}

/* عناصر الإحصائيات الداخلية */
.details-grid .detail-item {
    opacity: 0;
    animation: fadeInRight 0.3s ease forwards;
}

.detail-item:nth-child(1) { animation-delay: 0.05s; }
.detail-item:nth-child(2) { animation-delay: 0.1s; }
.detail-item:nth-child(3) { animation-delay: 0.15s; }
.detail-item:nth-child(4) { animation-delay: 0.2s; }
.detail-item:nth-child(5) { animation-delay: 0.25s; }
.detail-item:nth-child(6) { animation-delay: 0.3s; }
.detail-item:nth-child(7) { animation-delay: 0.35s; }
.detail-item:nth-child(8) { animation-delay: 0.4s; }

/* القادة في صفحة إدارة القادة */
#leadersList > div {
    opacity: 0;
    animation: bounceIn 0.5s ease forwards;
}

#leadersList > div:nth-child(1) { animation-delay: 0.1s; }
#leadersList > div:nth-child(2) { animation-delay: 0.2s; }
#leadersList > div:nth-child(3) { animation-delay: 0.3s; }
#leadersList > div:nth-child(4) { animation-delay: 0.4s; }
#leadersList > div:nth-child(5) { animation-delay: 0.5s; }

/* المناطق والطلايع في صفحة الإدارة */

    animation: flipIn 0.5s ease forwards;
}

#squadsList > div:nth-child(1) { animation-delay: 0.1s; }
#squadsList > div:nth-child(2) { animation-delay: 0.2s; }
#squadsList > div:nth-child(3) { animation-delay: 0.3s; }

/* hover effect للعناصر */
.stat-card, .card, .btn, .task-item, .message {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.stat-card:hover, .card:hover {

.stat-card, .card, .btn, .data-table tr,

.sidebar-menu li, .footer, .detail-item,

body.loaded .stat-card,
body.loaded .card,
body.loaded .btn,
body.loaded .data-table tr,
body.loaded .task-item,
body.loaded .message,
body.loaded .squad-filter,
body.loaded .sidebar-menu li,
body.loaded .footer,
body.loaded .detail-item,
body.loaded #leadersList > div,

/* ==================== DARK/LIGHT MODE VARIABLES ==================== */

    --gold: #d4a017;
    --gold-dark: #b8860b;
    --header-bg: rgba(255,255,255,0.95);
    --sidebar-bg: linear-gradient(180deg, #1a472a, #0d2818);
    --sidebar-text: rgba(255,255,255,0.85);
    --message-sent: linear-gradient(135deg, #d4a017, #b8860b);

    --sidebar-bg: linear-gradient(180deg, #2e7d32, #1b5e20);

    --message-sent: linear-gradient(135deg, #c9a03d, #a07c2a);
    --message-received: #f5f5f5;
    --input-border: #cccccc;
    --table-header: #2e7d32;

    --shadow: 0 4px 15px rgba(0,0,0,0.1);

    bottom: 0;
    left: 0;

    height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
}

    position: absolute;
    font-size: 30px;
    opacity: 0.15;
    animation: swim 15s linear infinite;
}

.fish1 { bottom: 10%; left: -50px; animation-duration: 12s; }
.fish2 { bottom: 20%; left: -80px; animation-duration: 18s; animation-delay: 2s; }
.fish3 { bottom: 5%; left: -30px; animation-duration: 14s; animation-delay: 5s; }

    0% { transform: translateX(0) scaleX(1); }
    49% { transform: translateX(calc(100vw + 100px)) scaleX(1); }
    50% { transform: translateX(calc(100vw + 100px)) scaleX(-1); }

}

/* Floating elements - Anchors & Ropes */
.floating-anchor-new {
    position: absolute;

    opacity: 0.2;
    animation: floatAnchorNew 6s ease-in-out infinite;

    50% { transform: translateY(-15px) rotate(5deg); }
}

/* Rope decoration */
.rope-decoration {
    position: absolute;
    height: 3px;
    background: linear-gradient(90deg, transparent, #8d6e63, #a1887f, #8d6e63, transparent);
    border-radius: 2px;
    z-index: 0;
    opacity: 0.3;
}

.rope-decoration:nth-child(5) { top: 15%; left: 10%; width: 80%; animation: ropeWave 10s ease-in-out infinite reverse; }

    0% { transform: translateX(0) scaleX(1); }
    49% { transform: translateX(calc(100vw + 100px)) scaleX(1); }
    50% { transform: translateX(calc(100vw + 100px)) scaleX(-1); }

async function saveEvaluationFormToFirebase(formData) {
    try {
        const newForm = {
            id: Date.now(),
            ...formData,
            type: 'evaluation',
            createdAt: new Date().toISOString(),
            status: 'active'
        };
        
        if (!appData.evaluationForms) appData.evaluationForms = [];
        appData.evaluationForms.push(newForm);
        
        await saveAllDataToFirebase();
        showToast('✅ تم حفظ فورم التقييم بنجاح');
        return newForm;
    } catch (error) {
        showToast('❌ حدث خطأ أثناء حفظ فورم التقييم', 'error');
        return null;
    }
}
async function sendEvaluationFormToAllLeaders(formId) {
    try {
        const form = appData.evaluationForms.find(f => f.id === formId);
        if (!form) {
            showToast('❌ فورم التقييم غير موجود', 'error');
            return false;
        }
        
        form.status = 'sent_to_leaders';
        
        if (!appData.leaderEvaluationForms) appData.leaderEvaluationForms = [];
        
        appData.leaders.forEach(leader => {
            const alreadySent = appData.leaderEvaluationForms.some(lf => 
                lf.formId === formId && lf.leaderId === leader.id
            );
            
            if (!alreadySent) {
                appData.leaderEvaluationForms.push({
                    id: Date.now() + Math.random(),
                    formId: formId,
                    leaderId: leader.id,
                    sentToMembers: false,
                    sentAt: new Date().toISOString(),
                    formData: { ...form }
                });
            }
        });
        
        await saveAllDataToFirebase();
        showToast(`✅ تم إرسال فورم التقييم إلى ${appData.leaders.length} قائد`);
        return true;
    } catch (error) {
        showToast('❌ حدث خطأ أثناء الإرسال', 'error');
        return false;
    }
}

function updateEvaluationQuestionNumbers() {
    const questions = document.querySelectorAll('.eval-question-item');
    questions.forEach((q, idx) => {
        const strongTag = q.querySelector('strong');
        if (strongTag) {
            strongTag.textContent = `سؤال إضافي ${idx + 1}`;
        }
    });
    evalQuestionCounter = questions.length;
}

// ==================== PAGE TRANSITION FUNCTIONS ====================

// دالة تغيير الصفحة مع أنيميشن
async function changePageWithAnimation(newPageRenderFunction) {
    // 1. إضافة تأثير الخروج على الـ container الرئيسي
    const app = document.getElementById('app');
    if (!app) return;
    
    app.classList.add('page-transition-out');
    
    // 2. انتظار انتهاء تأثير الخروج
    await new Promise(resolve => setTimeout(resolve, 250));
    
    // 3. تنفيذ الدالة الجديدة (تغيير المحتوى)
    if (typeof newPageRenderFunction === 'function') {
        newPageRenderFunction();
    } else {
        newPageRenderFunction();
    }
    
    // 4. إزالة كلاس الخروج وإضافة كلاس الدخول
    app.classList.remove('page-transition-out');
    app.classList.add('page-transition-in');
    
    // 5. إزالة كلاس الدخول بعد انتهاء الأنيميشن
    setTimeout(() => {
        app.classList.remove('page-transition-in');
    }, 400);
}

// نسخة مبسطة للاستخدام بدون await (للاستدعاء المباشر)
function transitionToPage(pageRenderFunction) {
    changePageWithAnimation(pageRenderFunction);
}

async function sendEvaluationFormToMyMembers(formId) {
    // نفس منطق sendFormToMyMembers مع حفظ الإجابات في memberEvaluationAnswers
    const leaderForm = appData.leaderEvaluationForms?.find(lf => lf.formId === formId && lf.leaderId === currentUser.id);
    if (!leaderForm) {
        showToast('❌ فورم التقييم غير موجود', 'error');
        return;
    }
    
    const mySubBranchIds = currentUser.subBranchIds || [];
    const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.branchId));
    const mySquadIds = mySquads.map(s => s.id);
    const myMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    
    if (myMembers.length === 0) {
        showToast('⚠️ لا يوجد أعضاء في فروعك', 'error');
        return;
    }
    
    const form = appData.evaluationForms.find(f => f.id === formId);
    if (!form) return;
    
    leaderForm.sentToMembers = true;
    leaderForm.sentToMembersAt = new Date().toISOString();
    
    if (!appData.memberEvaluationForms) appData.memberEvaluationForms = [];
    
    myMembers.forEach(member => {
        const alreadySent = appData.memberEvaluationForms?.some(mf => mf.formId === formId && mf.memberId === member.id);
        if (!alreadySent) {
            appData.memberEvaluationForms.push({
                id: Date.now() + Math.random(),
                formId: formId,
                memberId: member.id,
                leaderId: currentUser.id,
                sentAt: new Date().toISOString(),
                isAnswered: false,
                starRating: null,
                answers: [],
                formData: { ...form }
            });
        }
    });
    
    await saveAllDataToFirebase();
    showToast(`✅ تم إرسال فورم التقييم "${form.title}" إلى ${myMembers.length} عضو`);
    renderLeaderEvaluationFormsPage();
}

function answerEvaluationForm(formId) {
    const memberForm = appData.memberEvaluationForms?.find(mf => mf.formId === formId && mf.memberId === currentUser.id);
    if (!memberForm || memberForm.isAnswered) {
        showToast('لا يمكن الإجابة على هذا الفورم', 'error');
        return;
    }
    
    let form = appData.evaluationForms?.find(f => f.id === formId);
    if (!form && memberForm.formData) form = memberForm.formData;
    if (!form) {
        showToast('❌ بيانات الفورم غير موجودة', 'error');
        return;
    }
    
    let selectedRating = 0;
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    
    let questionsHtml = '';
    form.questions?.forEach((q, idx) => {
        questionsHtml += `
            <div class="eval-question-answer" style="background:#f8f9fa; border-radius:12px; padding:15px; margin-bottom:15px;">
                <p><strong>${idx + 1}. ${escapeHtml(q.text)}</strong></p>
                <textarea class="eval-text-answer" data-q-idx="${idx}" rows="2" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;" placeholder="اكتب إجابتك هنا..."></textarea>
            </div>
        `;
    });
    
    modal.innerHTML = `
        <div class="modal-content" style="max-width:600px; max-height:85vh; overflow-y:auto;">
            <div class="modal-header">
                <h3><i class="fas fa-star"></i> ${escapeHtml(form.title)}</h3>
                <span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span>
            </div>
            
            ${form.pointsEnabled && form.pointsValue ? `<div style="background: #d4a01720; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center;"><i class="fas fa-star"></i> هذا التقييم يمنح <strong>${form.pointsValue} نقطة</strong> عند الإكمال</div>` : ''}
            
            <div class="input-group" style="text-align:center;">
                <label><strong>${escapeHtml(form.starRatingTitle || 'تقييم عام')}</strong></label>
                <div id="starRatingContainer" style="display:flex; justify-content:center; gap:10px; margin:15px 0; direction:ltr;">
                    ${[1,2,3,4,5].map(star => `
                        <i class="far fa-star star-rating-star" data-value="${star}" style="font-size:48px; cursor:pointer; color:#d4a017; transition:0.2s;"></i>
                    `).join('')}
                </div>
                <p id="selectedRatingText" style="color:#666;">لم يتم الاختيار بعد</p>
            </div>
            
            <hr>
            
            <h4><i class="fas fa-question-circle"></i> الأسئلة الإضافية</h4>
            <div id="evalQuestionsAnswers">
                ${questionsHtml || '<p>لا توجد أسئلة إضافية</p>'}
            </div>
            
            <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
                <button type="button" class="btn btn-secondary" onclick="this.closest('.modal').remove()">إلغاء</button>
                <button type="button" class="btn btn-primary" id="submitEvaluationBtn">إرسال التقييم</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
    
    // إضافة حدث اختيار النجوم
    const stars = modal.querySelectorAll('.star-rating-star');
    stars.forEach(star => {
        star.addEventListener('click', () => {
            selectedRating = parseInt(star.getAttribute('data-value'));
            stars.forEach((s, idx) => {
                if (idx < selectedRating) {
                    s.className = 'fas fa-star star-rating-star';
                } else {
                    s.className = 'far fa-star star-rating-star';
                }
            });
            document.getElementById('selectedRatingText').innerHTML = `تم الاختيار: <strong style="font-size:20px;">${'⭐'.repeat(selectedRating)} (${selectedRating}/5)</strong>`;
        });
    });
    
    document.getElementById('submitEvaluationBtn').addEventListener('click', async () => {
        if (selectedRating === 0) {
            showToast('الرجاء اختيار التقييم بالنجوم', 'error');
            return;
        }
        
        const answers = [];
        const textAreas = modal.querySelectorAll('.eval-text-answer');
        textAreas.forEach((ta, idx) => {
            const answer = ta.value.trim();
            if (answer) {
                answers.push({
                    questionId: form.questions?.[idx]?.id,
                    answer: answer
                });
            }
        });
        
        memberForm.isAnswered = true;
        memberForm.answeredAt = new Date().toISOString();
        memberForm.starRating = selectedRating;
        memberForm.answers = answers;
        
        // منح النقاط إذا كان الفورم يدعم النقاط
        let pointsAwarded = 0;
        if (form.pointsEnabled && form.pointsValue) {
            pointsAwarded = form.pointsValue;
            const oldPoints = currentUser.points;
            currentUser.points = (currentUser.points || 0) + pointsAwarded;
            
            // تحديث رتبة العضو
            if (currentUser.points >= 200) currentUser.rank = "قائد متميز";
            else if (currentUser.points >= 100) currentUser.rank = "قائد";
            else if (currentUser.points >= 50) currentUser.rank = "نائب قائد";
            else currentUser.rank = "عضو";
            
            showToast(`🎉 شكراً لتقييمك! حصلت على ${pointsAwarded} نقطة`, 'success');
            
            // تحديث بيانات العضو في قاعدة البيانات
            const memberIndex = appData.members.findIndex(m => m.id === currentUser.id);
            if (memberIndex !== -1) {
                appData.members[memberIndex] = currentUser;
            }
        } else {
            showToast('✅ تم إرسال تقييمك بنجاح');
        }
        
        memberForm.pointsAwarded = pointsAwarded;
        
        // حفظ الإجابة في التخزين العام للنتائج
        if (!appData.memberEvaluationAnswers) appData.memberEvaluationAnswers = [];
        appData.memberEvaluationAnswers.push({
            id: Date.now(),
            formId: formId,
            memberId: currentUser.id,
            starRating: selectedRating,
            answers: answers,
            pointsAwarded: pointsAwarded,
            submittedAt: new Date().toISOString()
        });
        
        await saveAllDataToFirebase();
        modal.remove();
        
        // تحديث الصفحة
        if (typeof renderMemberEvaluationFormsPage === 'function') {
            renderMemberEvaluationFormsPage();
        }
        if (typeof renderMemberDashboard === 'function') {
            renderMemberDashboard();
        }
    });
}

async function saveFormToFirebase(formData) {
    try {
        const newForm = {
            id: Date.now(),
            ...formData,
            createdAt: new Date().toISOString(),
            status: 'active'
        };
        
        if (!appData.forms) appData.forms = [];
        appData.forms.push(newForm);
        
        await saveAllDataToFirebase();
        showToast('✅ تم حفظ الفورم بنجاح');
        return newForm;
    } catch (error) {
        showToast('❌ حدث خطأ أثناء حفظ الفورم', 'error');
        return null;
    }
}

async function sendFormToAllLeaders(formId) {
    try {
        const form = appData.forms.find(f => f.id === formId);
        if (!form) {
            showToast('❌ الفورم غير موجود', 'error');
            return false;
        }
        
        form.status = 'sent_to_leaders';
        
        if (!appData.leaderForms) appData.leaderForms = [];
        
        appData.leaders.forEach(leader => {
            const alreadySent = appData.leaderForms.some(lf => 
                lf.formId === formId && lf.leaderId === leader.id
            );
            
            if (!alreadySent) {
                appData.leaderForms.push({
                    id: Date.now() + Math.random(),
                    formId: formId,
                    leaderId: leader.id,
                    sentToMembers: false,
                    sentAt: new Date().toISOString(),
                    formData: { ...form }
                });
            }
        });
        
        await saveAllDataToFirebase();
        showToast(`✅ تم إرسال الفورم إلى ${appData.leaders.length} قائد`);
        return true;
    } catch (error) {
        showToast('❌ حدث خطأ أثناء الإرسال', 'error');
        return false;
    }
}

                pointsContainer.style.display = 'none';

        });

        const title = document.getElementById('formTitle').value.trim();

        const questions = [];
        const questionDivs = document.querySelectorAll('.question-item');
        
        for (let i = 0; i < questionDivs.length; i++) {

            const questionText = div.querySelector('.question-text')?.value.trim();
            if (!questionText) continue;
            
            const question = {
                id: Date.now() + i,
                text: questionText,
                options: [],
                correctAnswer: null
            };
            
            const optionInputs = div.querySelectorAll('.option-input');
            optionInputs.forEach((opt, optIdx) => {

                    const isCorrect = div.querySelector(`.correct-option-${optIdx}`)?.checked || false;

                        isCorrect: isCorrect
                    });

            if (question.options.length > 0) {
                questions.push(question);
            }

pointsValue: pointsEnabled ? Math.max(1, parseInt(document.getElementById('formPointsValue').value) || 1) : 0
        };
        
        await saveFormToFirebase(newForm);
        modal.remove();
        renderFormsPage();
    });

let questionCounter = 0;

function addNewQuestion() {
    const container = document.getElementById('questionsContainer');
    questionCounter++;
    const questionId = Date.now();
    
    const questionDiv = document.createElement('div');
    questionDiv.className = 'question-item';
    questionDiv.style.cssText = 'background:#f0f5f0; border-radius:15px; padding:15px; margin-bottom:15px; border-right:3px solid #d4a017;';
    questionDiv.setAttribute('data-id', questionId);
    
    questionDiv.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <strong style="color:#1a472a;">السؤال ${questionCounter}</strong>
            <button type="button" class="btn btn-sm btn-danger" onclick="this.closest('.question-item').remove(); updateQuestionNumbers();">
                <i class="fas fa-trash"></i> حذف
            </button>
        </div>
        
        <div class="input-group">
            <label>نص السؤال</label>

                <i class="fas fa-plus"></i> إضافة اختيار إضافي
            </button>
        </div>
    `;
    
    container.appendChild(questionDiv);
    
    const optionsList = questionDiv.querySelector('.options-list');
    addOptionRow(optionsList, 0, questionId);
    addOptionRow(optionsList, 1, questionId);
}

function updateQuestionNumbers() {
    const questions = document.querySelectorAll('.question-item');
    questions.forEach((q, idx) => {
        const strongTag = q.querySelector('strong');
        if (strongTag) {
            strongTag.textContent = `السؤال ${idx + 1}`;
        }
    });
    questionCounter = questions.length;
}

function addOptionToQuestion(button) {
    const questionDiv = button.closest('.question-item');
    const optionsList = questionDiv.querySelector('.options-list');
    const currentCount = optionsList.children.length;
    const questionId = questionDiv.getAttribute('data-id');
    addOptionRow(optionsList, currentCount, questionId);
}

async function showFormAnswers(formId) {

        showToast('❌ الفورم غير موجود', 'error');
        return;
    }
    
    let form = appData.forms?.find(f => f.id === formId);
    if (!form && leaderForm.formData) form = leaderForm.formData;
    if (!form) {
        showToast('❌ بيانات الفورم غير موجودة', 'error');
        return;
    }
    
    const memberForms = (appData.memberForms || []).filter(mf => mf.formId === formId);
    const answeredMembers = memberForms.filter(mf => mf.isAnswered);
    
    // ترتيب حسب وقت الإجابة (الأول فالأول)
    answeredMembers.sort((a, b) => new Date(a.answeredAt) - new Date(b.answeredAt));

        const scoreText = mf.score ? `${Math.round(mf.score)}% (${mf.correctCount}/${mf.totalQuestions})` : 'تم الإجابة';
        
        answersHtml += `
            <div style="background: #f8f9fa; border-radius: 12px; padding: 15px; margin-bottom: 12px; border-right: 3px solid ${mf.pointsAwarded > 0 ? '#2ecc71' : '#d4a017'};">

                        <span class="badge" style="background: #3498db;">${scoreText}</span>
                    </div>
                </div>
                <div style="font-size: 13px; color: #666;">
                    <i class="fas fa-clock"></i> أجاب في: ${new Date(mf.answeredAt).toLocaleString('ar-EG')}

                            <span style="color: ${ans.isCorrect ? '#2ecc71' : '#e74c3c'}">

                    `).join('')}

            </div>
        `;
    }
    
    modal.innerHTML = `
        <div class="modal-content" style="max-width:700px; max-height:85vh; overflow-y:auto;">

        showToast('❌ الفورم غير موجود في قائمة الفورمات المرسلة لك', 'error');
        return;
    }
    
    // جلب بيانات الفورم من leaderForm أو من forms
    const form = leaderForm.formData || appData.forms?.find(f => f.id === formId);
    if (!form) {
        showToast('❌ بيانات الفورم غير موجودة', 'error');
        return;
    }
    
    // جلب الفروع والطلايع المتاحة للقائد (فقط التي يتبعها)
    const mySubBranchIds = currentUser.subBranchIds || [];
    
    // جلب المناطق التي يتبعها القائد
    const myBranchIds = [...new Set(appData.subBranches
        .filter(sb => mySubBranchIds.includes(sb.id))
        .map(sb => sb.branchId)
    )];
    
    // جلب الفروع التي يتبعها القائد فقط
    const mySubBranches = appData.subBranches.filter(sb => mySubBranchIds.includes(sb.id));
    
    // جلب الطلايع التي يتبعها القائد
    const mySquads = appData.squads.filter(s => myBranchIds.includes(s.branchId));
    
    // أنواع الفرق للفلتر
    const squadTypes = ['الكشافة', 'المرشدات', 'الأشبال', 'الزهرات', 'البراعم'];
    
    // بناء خيارات المناطق
    let branchesOptions = '<option value="">-- اختر المجموعه --</option>';
    myBranchIds.forEach(branchId => {
        const branch = appData.branches.find(b => b.id === branchId);
        if (branch) {
            branchesOptions += `<option value="${branch.id}">🏢 ${branch.name}</option>`;
        }
    });
    
    if (myBranchIds.length === 0) {
        branchesOptions = '<option value="" disabled>⚠️ لا توجد مناطق مسموح لك بها</option>';
    }
    
    modal.innerHTML = `
        <div class="modal-content" style="max-width:500px;">
            <div class="modal-header">
                <h3><i class="fas fa-paper-plane"></i> إرسال الفورم: ${escapeHtml(form.title)}</h3>
                <span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span>
            </div>
            <form id="sendFormDestinationForm">
                <div class="input-group">
                    <label><i class="fas fa-map-marker-alt"></i> اختر المجموعه</label>
                    <select id="destinationBranch" required style="width:100%; padding:10px; border-radius:10px;">
                        ${branchesOptions}
                    </select>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-code-branch"></i> اختر الهيئه</label>
                    <select id="destinationSubBranch" required style="width:100%; padding:10px; border-radius:10px;">
                        <option value="">-- اختر المجموعه أولاً --</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-flag"></i> اختر الطليعة</label>
                    <select id="destinationSquad" required style="width:100%; padding:10px; border-radius:10px;">
                        <option value="all">-- جميع الطلايع في هذه الهيئه --</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-users"></i> اختر نوع الفريق (اختياري)</label>
                    <select id="destinationType" style="width:100%; padding:10px; border-radius:10px;">
                        <option value="all">🎯 جميع الأنواع</option>
                        ${squadTypes.map(type => `<option value="${type}">${type === 'الكشافة' ? '⚜️' : type === 'المرشدات' ? '🌸' : type === 'الأشبال' ? '🦁' : type === 'الزهرات' ? '🌺' : '🌱'} ${type}</option>`).join('')}
                    </select>
                </div>
                
                <div class="input-group" id="selectedMembersCount" style="background:#e8f5e9; padding:10px; border-radius:10px; text-align:center;">
                    <i class="fas fa-info-circle"></i> سيتم الإرسال إلى <span id="membersCount">0</span> عضو
                </div>
                
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" onclick="this.closest('.modal').remove()">إلغاء</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> إرسال
                    </button>
                </div>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    // العناصر
    const branchSelect = document.getElementById('destinationBranch');
    const subBranchSelect = document.getElementById('destinationSubBranch');
    const squadSelect = document.getElementById('destinationSquad');
    const typeSelect = document.getElementById('destinationType');
    const membersCountSpan = document.getElementById('membersCount');
    
    // تحديث قائمة الفروع عند تغيير المنطقة
    function updateSubBranches() {
        const branchId = parseInt(branchSelect.value);
        if (branchId) {
            const mySubBranchesFiltered = mySubBranches.filter(sb => sb.branchId === branchId);
            subBranchSelect.innerHTML = '<option value="">-- اختر الهيئه --</option>' +
                mySubBranchesFiltered.map(sb => `<option value="${sb.id}">📍 ${sb.name}</option>`).join('');
            squadSelect.innerHTML = '<option value="all">-- جميع الطلايع في هذه الهيئه --</option>';
        } else {
            subBranchSelect.innerHTML = '<option value="">-- اختر المجموعه أولاً --</option>';
            squadSelect.innerHTML = '<option value="all">-- اختر الهيئه أولاً --</option>';
        }
        updateMembersCount();
    }
    
    // تحديث قائمة الطلايع عند تغيير الفرع
    function updateSquads() {
        const subBranchId = parseInt(subBranchSelect.value);
        if (subBranchId) {
            const selectedSubBranch = mySubBranches.find(sb => sb.id === subBranchId);
            if (selectedSubBranch) {
                const squads = mySquads.filter(s => s.branchId === selectedSubBranch.branchId);
                squadSelect.innerHTML = '<option value="all">-- جميع الطلايع في هذه الهيئه --</option>' +
                    squads.map(s => `<option value="${s.id}">🏴 ${s.name} (${s.type || 'كشافة'})</option>`).join('');
            }
        }
        updateMembersCount();
    }
    
    // تحديث عدد الأعضاء المستهدفين
    function updateMembersCount() {
        const branchId = parseInt(branchSelect.value);
        const subBranchId = parseInt(subBranchSelect.value);
        const squadId = squadSelect.value;
        const typeFilter = typeSelect.value;
        
        let targetMembers = [];
        
        if (branchId && subBranchId && squadId === 'all') {
            targetMembers = appData.members.filter(m => m.subBranchId === subBranchId);
        } else if (branchId && subBranchId && squadId !== 'all') {
            targetMembers = appData.members.filter(m => m.squadId == squadId);
        }
        
        // فلتر حسب النوع
        if (typeFilter !== 'all') {
            const squadIdsOfType = appData.squads
                .filter(s => s.type === typeFilter)
                .map(s => s.id);
            targetMembers = targetMembers.filter(m => squadIdsOfType.includes(m.squadId));
        }
        
        // فلتر: عدم إرسال لمن أجاب بالفعل
        const alreadySent = (appData.memberForms || []).filter(mf => mf.formId === formId).map(mf => mf.memberId);
        targetMembers = targetMembers.filter(m => !alreadySent.includes(m.id));
        
        membersCountSpan.textContent = targetMembers.length;
        membersCountSpan.style.fontWeight = 'bold';
        membersCountSpan.style.color = targetMembers.length > 0 ? '#2ecc71' : '#e74c3c';
    }
    
    // ربط الأحداث
    branchSelect.addEventListener('change', () => {
        updateSubBranches();
    });
    
    subBranchSelect.addEventListener('change', () => {
        updateSquads();
    });
    
    squadSelect.addEventListener('change', () => {
        updateMembersCount();
    });
    
    typeSelect.addEventListener('change', () => {
        updateMembersCount();
    });
    
    // تحديث أولي
    updateSubBranches();
    
    // معالجة الإرسال
    document.getElementById('sendFormDestinationForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const branchId = parseInt(branchSelect.value);
        const subBranchId = parseInt(subBranchSelect.value);
        const squadId = squadSelect.value;
        const typeFilter = typeSelect.value;
        
        if (!branchId || !subBranchId) {
            showToast('الرجاء اختيار المجموعه والهيئه', 'error');
            return;
        }
        
        // تحديد الأعضاء المستهدفين
        let targetMembers = [];
        
        if (squadId === 'all') {
            targetMembers = appData.members.filter(m => m.subBranchId === subBranchId);
        } else {
            targetMembers = appData.members.filter(m => m.squadId == squadId);
        }
        
        // فلتر حسب النوع
        if (typeFilter !== 'all') {
            const squadIdsOfType = appData.squads
                .filter(s => s.type === typeFilter)
                .map(s => s.id);
            targetMembers = targetMembers.filter(m => squadIdsOfType.includes(m.squadId));
        }
        
        // فلتر: عدم إرسال لمن أجاب بالفعل
        const alreadySent = (appData.memberForms || []).filter(mf => mf.formId === formId).map(mf => mf.memberId);
        targetMembers = targetMembers.filter(m => !alreadySent.includes(m.id));
        
        if (targetMembers.length === 0) {
            showToast('⚠️ لا يوجد أعضاء مستهدفين للإرسال', 'error');
            return;
        }
        
        // تحديث leaderForm بأنه تم الإرسال
        const leaderFormData = appData.leaderForms?.find(lf => lf.formId === formId && lf.leaderId === currentUser.id);
        if (leaderFormData) {
            leaderFormData.sentToMembers = true;
            leaderFormData.sentToMembersAt = new Date().toISOString();
        }
        
        // إنشاء نسخ من الفورم لكل عضو
        if (!appData.memberForms) appData.memberForms = [];
        
        targetMembers.forEach(member => {
            appData.memberForms.push({
                id: Date.now() + Math.random(),
                formId: formId,
                memberId: member.id,
                leaderId: currentUser.id,
                sentAt: new Date().toISOString(),
                isAnswered: false,
                answers: [],
                formData: form
            });
        });
        
        await saveAllDataToFirebase();
        showToast(`✅ تم إرسال الفورم "${form.title}" إلى ${targetMembers.length} عضو`);
        modal.remove();
        
        // تحديث صفحة الفورمات للقائد
        if (typeof renderLeaderFormsPage === 'function') {
            renderLeaderFormsPage();
        }
    });
}

// ==================== 4. دوال الفورم للأعضاء ====================

function renderMemberFormsPage() {
    const container = document.getElementById('memberPageContent');
    if (!container) return;
    
    const memberForms = (appData.memberForms || []).filter(mf => mf.memberId === currentUser.id);
    const pendingForms = memberForms.filter(mf => !mf.isAnswered);
    const completedForms = memberForms.filter(mf => mf.isAnswered);
    
    container.innerHTML = `
        <div class="card">
            <h3><i class="fas fa-file-alt"></i> الفورمات المستلمة</h3>
            
            ${pendingForms.length > 0 ? `
                <h4 style="color:#d4a017; margin:15px 0 10px;">📋 بانتظار الإجابة</h4>
                ${pendingForms.map(mf => {
                    const form = appData.forms?.find(f => f.id === mf.formId);
                    if (!form) return '';
                    return `
                        <div style="background:#fff3cd; border-radius:15px; padding:15px; margin-bottom:15px; border-right:4px solid #f39c12;">
                            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                                <div>
                                    <strong>${escapeHtml(form.title)}</strong>
                                    <br>
                                    <small>تاريخ الاستلام: ${new Date(mf.sentAt).toLocaleString('ar-EG')}</small>
                                </div>
                                <button class="btn btn-primary" onclick="answerMemberForm(${mf.formId})" style="margin-top:10px;">
                                    <i class="fas fa-edit"></i> الإجابة
                                </button>
                            </div>
                        </div>
                    `;
                }).join('')}
            ` : ''}
            
            ${completedForms.length > 0 ? `
                <h4 style="color:#2ecc71; margin:15px 0 10px;">✅ تم الإجابة عليها</h4>
                ${completedForms.map(mf => {
                    const form = appData.forms?.find(f => f.id === mf.formId);
                    if (!form) return '';
                    return `
                        <div style="background:#e8f5e9; border-radius:15px; padding:15px; margin-bottom:15px; border-right:4px solid #2ecc71;">
                            <div>
                                <strong>${escapeHtml(form.title)}</strong>
                                <br>
                                <small>تمت الإجابة: ${new Date(mf.answeredAt).toLocaleString('ar-EG')}</small>
                                ${mf.score !== undefined ? `<br><small>النتيجة: ${mf.score}%</small>` : ''}
                            </div>
                        </div>
                    `;
                }).join('')}
            ` : ''}
            
            ${pendingForms.length === 0 && completedForms.length === 0 ? 
                '<p style="text-align:center; color:#999;">لا توجد فورمات مستلمة بعد</p>' : ''}
        </div>
    `;
}

async function answerMemberForm(formId) {
    const memberForm = appData.memberForms?.find(mf => mf.formId === formId && mf.memberId === currentUser.id);
    if (!memberForm || memberForm.isAnswered) {
        showToast('لا يمكن الإجابة على هذا الفورم', 'error');
        return;
    }
    
    const form = appData.forms?.find(f => f.id === formId);
    if (!form) return;
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    
    let questionsHtml = '';
    form.questions?.forEach((q, idx) => {
        questionsHtml += `
            <div class="question-answer-item" data-q-idx="${idx}" style="background:#f8f9fa; border-radius:12px; padding:15px; margin-bottom:15px;">
                <p><strong>${idx + 1}. ${escapeHtml(q.text)}</strong></p>
                <div class="options-answer" style="margin-top:10px; margin-right:20px;">
                    ${q.options.map((opt, optIdx) => `
                        <label style="display:flex; align-items:center; gap:8px; margin-bottom:8px; cursor:pointer;">
                            <input type="radio" name="q_${idx}" value="${escapeHtml(opt.text)}" class="answer-radio">
                            <span>${escapeHtml(opt.text)}</span>
                        </label>
                    `).join('')}
                </div>
            </div>
        `;
    });
    
    modal.innerHTML = `
        <div class="modal-content" style="max-width:650px; max-height:85vh; overflow-y:auto;">
            <div class="modal-header">
                <h3><i class="fas fa-file-alt"></i> ${escapeHtml(form.title)}</h3>
                <span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span>
            </div>
            ${form.pointsEnabled && form.pointsValue ? `<div style="background: #d4a01720; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center;"><i class="fas fa-star"></i> هذا الفورم يمنح <strong>${form.pointsValue} نقطة</strong> عند الإجابة بنسبة 70% فأكثر</div>` : ''}
            <p>يرجى الإجابة على الأسئلة التالية:</p>
            <form id="answerForm">
                ${questionsHtml}
                <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
                    <button type="button" class="btn btn-secondary" onclick="this.closest('.modal').remove()">إلغاء</button>
                    <button type="submit" class="btn btn-primary">إرسال الإجابات</button>
                </div>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('answerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const answers = [];
        let correctCount = 0;
        
        form.questions.forEach((q, idx) => {
            const selectedRadio = document.querySelector(`input[name="q_${idx}"]:checked`);
            if (selectedRadio) {
                const isCorrect = q.correctAnswer === selectedRadio.value;
                answers.push({
                    questionId: q.id,
                    questionText: q.text,
                    answer: selectedRadio.value,
                    isCorrect: isCorrect
                });
                if (isCorrect) correctCount++;
            } else {
                showToast(`الرجاء الإجابة على السؤال ${idx + 1}`, 'error');
                return;
            }
        });
        
        const scorePercentage = (correctCount / form.questions.length) * 100;
        
        memberForm.isAnswered = true;
        memberForm.answeredAt = new Date().toISOString();
        memberForm.answers = answers;
        memberForm.score = scorePercentage;
        memberForm.correctCount = correctCount;
        memberForm.totalQuestions = form.questions.length;
        
        // منح النقاط إذا كان الفورم يدعم النقاط وحصل على 70% أو أكثر
        if (form.pointsEnabled && form.pointsValue && scorePercentage >= 70) {
            const pointsToAdd = form.pointsValue;
            const oldPoints = currentUser.points;
            currentUser.points = (currentUser.points || 0) + pointsToAdd;
            
            // تحديث رتبة العضو بناءً على النقاط الجديدة
            if (currentUser.points >= 200) currentUser.rank = "قائد متميز";
            else if (currentUser.points >= 100) currentUser.rank = "قائد";
            else if (currentUser.points >= 50) currentUser.rank = "نائب قائد";
            else currentUser.rank = "عضو";
            
            showToast(`🎉 أحسنت! حصلت على ${pointsToAdd} نقطة (${scorePercentage}%)`, 'success');
            
            // حفظ النقاط في إجابة العضو
            memberForm.pointsAwarded = pointsToAdd;
        } else if (form.pointsEnabled && form.pointsValue) {
            showToast(`⚠️ لم تحصل على نقاط، نسبتك ${scorePercentage}% (المطلوب 70% فأكثر)`, 'info');
            memberForm.pointsAwarded = 0;
        } else {
            showToast('✅ تم إرسال إجاباتك بنجاح');
            memberForm.pointsAwarded = null;
        }
        
        // تحديث بيانات العضو في قاعدة البيانات
        const memberIndex = appData.members.findIndex(m => m.id === currentUser.id);
        if (memberIndex !== -1) {
            appData.members[memberIndex] = currentUser;
        }
        
        await saveAllDataToFirebase();
        modal.remove();
        
        if (typeof renderMemberFormsPage === 'function') renderMemberFormsPage();
        if (typeof renderMemberDashboard === 'function') renderMemberDashboard();
    });
}

                    <div class="detail-label">كلمة المرور</div>
                    <div class="detail-value" style="display: flex; align-items: center; gap: 10px;">
                        <span id="leaderPasswordText">••••••</span>
                        <i class="fas fa-eye" id="toggleLeaderPasswordBtn" style="cursor: pointer; color: #d4a017; font-size: 16px;"></i>
                    </div>
                </div>
                <div class="detail-item"><div class="detail-label">تاريخ الإنشاء</div><div class="detail-value">${new Date(leader.createdAt).toLocaleString('ar-EG')}</div></div>

            </div>
        </div>
    `;
    document.body.appendChild(modal);
    
    // إضافة وظيفة إظهار/إخفاء كلمة المرور
    const toggleBtn = document.getElementById('toggleLeaderPasswordBtn');
    const passwordText = document.getElementById('leaderPasswordText');
    const actualPassword = leader.password;
    let leaderPasswordVisible = false;
    
    toggleBtn.addEventListener('click', () => {
        leaderPasswordVisible = !leaderPasswordVisible;
        if (leaderPasswordVisible) {
            passwordText.textContent = actualPassword;
            toggleBtn.classList.remove('fa-eye');
            toggleBtn.classList.add('fa-eye-slash');
        } else {
            passwordText.textContent = '••••••';
            toggleBtn.classList.remove('fa-eye-slash');
            toggleBtn.classList.add('fa-eye');
        }
    });
}

            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    // عند تغيير المنطقة، نحدث قائمة الفروع
    document.getElementById('editLeaderBranch').addEventListener('change', function() {
        const branchId = parseInt(this.value);
        const container = document.getElementById('editLeaderSubBranchesContainer');
        if (branchId) {
            container.innerHTML = getSubBranchesCheckboxes(branchId, leader.subBranchIds);
        } else {
            container.innerHTML = '<div style="text-align:center; color:#999;">-- اختر المجموعه أولاً --</div>';
        }
    });
    
    document.getElementById('editLeaderForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('editLeaderUsername').value;
        if (username !== leader.username) {
            if (appData.leaders.some(l => l.username === username)) {
                showToast('اسم المستخدم موجود مسبقاً', 'error');
                return;
            }
            if (appData.members.some(m => m.username === username)) {
                showToast('اسم المستخدم مستخدم من قبل عضو', 'error');
                return;
            }
        }
        
        // جمع الفروع المختارة
        const selectedSubBranches = [];
        document.querySelectorAll('#editLeaderSubBranchesContainer input[type="checkbox"]:checked').forEach(cb => {
            selectedSubBranches.push({
                id: parseInt(cb.value),
                name: cb.getAttribute('data-name')
            });
        });
        
        if (selectedSubBranches.length === 0) {
            showToast('الرجاء اختيار فرع واحد على الأقل', 'error');
            return;
        }
        
        // تحديث بيانات القائد
        leader.name = document.getElementById('editLeaderName').value;
        leader.age = parseInt(document.getElementById('editLeaderAge').value);
        leader.phone = document.getElementById('editLeaderPhone').value;
        leader.branchId = parseInt(document.getElementById('editLeaderBranch').value);
        leader.subBranchIds = selectedSubBranches.map(sb => sb.id);
        leader.subBranches = selectedSubBranches;
        leader.username = username;
        const newPassword = document.getElementById('editLeaderPassword').value;
        if (newPassword) leader.password = newPassword;
        
        await saveAllDataToFirebase();
        showToast('تم تحديث بيانات القائد بنجاح');
        modal.remove();
        renderLeadersList();
    });
}

// دالة مساعدة للحصول على checked boxes للفروع
function getSubBranchesCheckboxes(branchId, selectedSubBranchIds) {
    if (!branchId) return '<div style="text-align:center; color:#999;">-- اختر المجموعه أولاً --</div>';
    
    const branches = appData.subBranches.filter(sb => sb.branchId === branchId);
    if (branches.length === 0) {
        return '<div style="text-align:center; color:#999;">لا توجد فروع في هذه المجموعه</div>';
    }
    
    return branches.map(sb => `
        <label style="display: flex; align-items: center; gap: 10px; padding: 8px; margin: 4px 0; background: white; border-radius: 8px; cursor: pointer;">
            <input type="checkbox" class="subBranchCheckbox" value="${sb.id}" data-name="${sb.name}" ${selectedSubBranchIds?.includes(sb.id) ? 'checked' : ''}>
            <span><i class="fas fa-code-branch"></i> ${sb.name}</span>
        </label>
    `).join('');
}

       function listenForRealTimeUpdates() {
    database.ref('appData').on('value', (snapshot) => {

        if (data && currentUser) {
            const oldMembersLength = appData.members.length;
            const oldRequestsLength = appData.joinRequests.length;
            
            // تحميل جميع البيانات من Firebase
            appData.branches = data.branches || [];

            appData.squads = data.squads || [];
            appData.members = data.members || [];
            appData.leaders = data.leaders || [];
            appData.tasks = data.tasks || [];
            appData.taskSubmissions = data.taskSubmissions || [];
            appData.messages = data.messages || [];
            appData.joinRequests = data.joinRequests || [];
            
            // تحميل بيانات الفورمات
            appData.forms = data.forms || [];
            appData.leaderForms = data.leaderForms || [];
            appData.memberForms = data.memberForms || [];
            appData.evaluationForms = data.evaluationForms || [];
            appData.leaderEvaluationForms = data.leaderEvaluationForms || [];
            appData.memberEvaluationAnswers = data.memberEvaluationAnswers || [];
            
            // إشعار بوجود طلبات انضمام جديدة للقائد العام
            if (oldRequestsLength !== appData.joinRequests.length && isAdmin) {
                updatePendingRequestsBadge();
                showToast(`📋 يوجد ${appData.joinRequests.filter(r => r.status === 'pending').length} طلب انضمام جديد`, 'info');
            }
            
            // تحديث جدول الأعضاء إذا تغير
            if (oldMembersLength !== appData.members.length && document.getElementById('membersTable')) {
                renderMembersTable();
            }
            
            // تحديث الصفحات المفتوحة
            if (document.getElementById('adminPageContent')) {
                refreshCurrentAdminPage();
            }
            if (document.getElementById('memberPageContent')) {
                refreshCurrentMemberPage();
            }
            if (document.getElementById('leaderPageContent')) {
                refreshCurrentLeaderPage();
            }
            
            showToast('تم تحديث البيانات', 'info');
        }
    });
}

        if (subBranchId) {

        };

        if (appData.joinRequests.some(r => r.username === username && r.status === 'pending')) {
            showToast('هذا الاسم موجود في طلب سابق لا يزال قيد المراجعة', 'error');

        const squadType = document.getElementById('reqSquadType').value || (squad ? squad.type : 'الكشافة');

            requestedAt: new Date().toISOString(),

// ==================== DARK/LIGHT MODE FUNCTIONS ====================
function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
    } else {
        document.body.classList.remove('light-mode');
    }
    addThemeToggleButton();
}

function addThemeToggleButton() {
    // إزالة الزر القديم إذا وجد
    const oldBtn = document.getElementById('themeToggleBtn');
    if (oldBtn) oldBtn.remove();
    
    // نبحث عن الهيدر العلوي
    const header = document.querySelector('.header');
    if (!header) return;
    
    // نبحث عن user-info (القسم الذي يحتوي على اسم المستخدم والأزرار)
    let userInfoDiv = header.querySelector('.user-info');
    
    if (!userInfoDiv) {
        // إذا لم نجد user-info، ننشئه
        userInfoDiv = document.createElement('div');
        userInfoDiv.className = 'user-info';
        userInfoDiv.style.display = 'flex';
        userInfoDiv.style.alignItems = 'center';
        userInfoDiv.style.gap = '10px';
        userInfoDiv.style.backgroundColor = 'rgba(0,0,0,0.05)';
        userInfoDiv.style.padding = '5px 15px';
        userInfoDiv.style.borderRadius = '40px';
        header.appendChild(userInfoDiv);
    }
    
    // ننشئ زر تغيير الوضع
    const themeBtn = document.createElement('div');
    themeBtn.id = 'themeToggleBtn';
    themeBtn.style.display = 'inline-flex';
    themeBtn.style.alignItems = 'center';
    themeBtn.style.justifyContent = 'center';
    themeBtn.style.width = '38px';
    themeBtn.style.height = '38px';
    themeBtn.style.borderRadius = '50%';
    themeBtn.style.backgroundColor = 'white';
    themeBtn.style.cursor = 'pointer';
    themeBtn.style.border = '1px solid #d4a017';
    themeBtn.style.transition = 'all 0.3s ease';
    
    const isLight = document.body.classList.contains('light-mode');
    themeBtn.innerHTML = `<i class="fas ${isLight ? 'fa-sun' : 'fa-moon'}" style="font-size: 18px; color: #d4a017;"></i>`;
    
    // وظيفة الضغط على الزر
    themeBtn.onclick = (e) => {
        e.stopPropagation();
        if (document.body.classList.contains('light-mode')) {
            document.body.classList.remove('light-mode');
            localStorage.setItem('theme', 'dark');
            themeBtn.innerHTML = '<i class="fas fa-moon" style="font-size: 18px; color: #d4a017;"></i>';
        } else {
            document.body.classList.add('light-mode');
            localStorage.setItem('theme', 'light');
            themeBtn.innerHTML = '<i class="fas fa-sun" style="font-size: 18px; color: #d4a017;"></i>';
        }
    };
    
    // البحث عن زر المنزل
    const homeBtn = document.getElementById('homeBtnWrapper');
    
    if (homeBtn) {
        // نضيف زر الوضع قبل زر المنزل مباشرة (بجانبه)
        userInfoDiv.insertBefore(themeBtn, homeBtn);
    } else {
        // إذا لم نجد زر المنزل، نضيفه في نهاية user-info
        userInfoDiv.appendChild(themeBtn);
    }
}

function updateLandingStats() {

    const tasksCount = document.getElementById('statTasks');
    const pointsCount = document.getElementById('statPoints');
    
    if (membersCount) animateNumber(membersCount, 0, appData.members.length, 2000);
    if (squadsCount) animateNumber(squadsCount, 0, appData.squads.length, 2000);
    if (tasksCount) animateNumber(tasksCount, 0, appData.taskSubmissions.filter(ts => ts.status === 'completed').length, 2000);
    if (pointsCount) animateNumber(pointsCount, 0, appData.members.reduce((sum, m) => sum + m.points, 0), 2000);
}

function animateNumber(element, start, end, duration) {
    let startTime = null;
    const step = (timestamp) => {
        if (!startTime) startTime = timestamp;
        const progress = Math.min((timestamp - startTime) / duration, 1);
        element.textContent = Math.floor(progress * (end - start) + start);
        if (progress < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
}
